<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Tema] · Cooperativa Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
:root{
  --verde:#234a35; --verde-sec:#2f7d52; --ambar:#f0a226; --ambar-txt:#9a6a12;
  --tinta:#1a2421; --tinta-2:#52615b; --tinta-3:#7d7763;
  --blanco:#fff; --niebla:#f6f8f7; --niebla-2:#fbfcfb; --linea:#e7ece9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--niebla);color:var(--tinta);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2{font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:-.01em}
.wrap{max-width:1080px;margin:0 auto;padding:18px}

.card{background:var(--blanco);border:1px solid var(--linea);border-radius:16px;overflow:hidden}
.franja{height:5px;background:linear-gradient(90deg,var(--verde),var(--verde-sec) 55%,var(--ambar))}
.layout{display:flex;min-height:380px}

.nav{width:210px;flex-shrink:0;border-right:1px solid var(--linea);padding:16px 12px;background:var(--niebla-2)}
.nav-head{display:flex;align-items:center;gap:8px;padding:0 8px 12px}
.nav-head .ic{width:26px;height:26px;border-radius:7px;background:var(--verde);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.nav-head span{font-size:12.5px;font-weight:600;color:var(--tinta);line-height:1.2}
.tabs{display:flex;flex-direction:column;gap:3px}
.tab{position:relative;font-family:inherit;font-size:13px;cursor:pointer;border:none;border-radius:9px;padding:10px 12px 10px 14px;background:transparent;color:var(--tinta-2);display:flex;align-items:center;gap:9px;text-align:left;width:100%;min-height:44px;transition:.15s}
.tab:hover{background:var(--niebla)}
.tab .bar{position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--ambar);opacity:0;transition:.15s}
.tab.on{background:rgba(35,74,53,.08);color:var(--verde);font-weight:600}
.tab.on .bar{opacity:1}

.stage{flex:1;min-width:0;padding:24px 28px 28px}

.cap-head{display:flex;align-items:flex-start;gap:12px}
.cap-ic{width:38px;height:38px;border-radius:10px;background:rgba(35,74,53,.08);display:flex;align-items:center;justify-content:center;color:var(--verde);flex-shrink:0;font-size:20px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--verde-sec)}
.cap-title{font-size:25px;font-weight:600;color:var(--tinta);line-height:1.15;margin-top:2px}
.cap-body{font-size:16px;line-height:1.7;color:var(--tinta);margin-top:18px}
.cap-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:18px}
.mini{background:var(--niebla);border-radius:11px;padding:13px 15px}
.mini .t{font-size:13px;font-weight:600;color:var(--verde)}
.mini .s{font-size:13px;color:var(--tinta-2);margin-top:3px}
.legal{margin-top:22px;border-left:3px solid var(--ambar);background:rgba(240,162,38,.07);border-radius:0 11px 11px 0;padding:14px 16px}
.legal-lab{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ambar-txt);margin-bottom:6px}
.legal-art{font-size:13px;font-weight:600;color:var(--tinta)}
.legal-txt{font-size:14px;line-height:1.65;color:var(--tinta);margin-top:6px}

.portada{text-align:center;padding:46px 20px;background:linear-gradient(160deg,rgba(35,74,53,.06),rgba(240,162,38,.05));border-radius:14px;height:100%;display:flex;flex-direction:column;justify-content:center}
.portada .logo{width:54px;height:54px;border-radius:14px;background:var(--verde);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto}
.portada .marca{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--verde-sec);margin-top:16px}
.portada h1{font-size:30px;color:var(--tinta);margin-top:6px;line-height:1.1}
.portada p{font-size:15px;color:var(--tinta-2);margin-top:12px;max-width:430px;margin-left:auto;margin-right:auto}

/* topbar con present toggle */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.btn{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--verde);background:var(--verde);color:#fff;border-radius:9px;padding:9px 15px;min-height:42px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:#1a2e22}

/* present mode */
.prow{display:none;align-items:center;justify-content:space-between;padding:14px 26px;border-top:1px solid var(--linea);background:var(--niebla-2)}
.parrow{font-family:inherit;font-size:14px;cursor:pointer;border:1px solid var(--linea);background:#fff;color:var(--tinta);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:7px;min-height:46px}
.parrow:hover{border-color:var(--verde-sec)}
.dots{display:flex;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;background:#d7ddd9}
.dot.on{background:var(--verde)}

body.present .wrap{max-width:100%;padding:0}
body.present .nav{display:none}
body.present .card{border-radius:0;border:none;min-height:100vh}
body.present .layout{min-height:calc(100vh - 5px - 76px)}
body.present .stage{padding:48px 7vw}
body.present .prow{display:flex}
body.present .topbar{position:fixed;top:14px;right:14px;margin:0;z-index:10}
body.present .cap-ic{width:56px;height:56px;font-size:30px}
body.present .eyebrow{font-size:16px}
body.present .cap-title{font-size:42px}
body.present .cap-body{font-size:24px;margin-top:26px}
body.present .cap-cards{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:26px}
body.present .mini{padding:16px 20px}
body.present .mini .t{font-size:18px}
body.present .mini .s{font-size:16px}
body.present .legal{margin-top:30px;border-left-width:4px;padding:18px 22px}
body.present .legal-lab{font-size:13px}
body.present .legal-art{font-size:17px}
body.present .legal-txt{font-size:21px}
body.present .portada h1{font-size:46px}
body.present .portada .logo{width:76px;height:76px;font-size:40px}

.foot{font-size:12px;color:var(--tinta-3);text-align:center;margin-top:14px}

@media (max-width:820px){
  .layout{flex-direction:column}
  .nav{width:auto;border-right:none;border-bottom:1px solid var(--linea)}
  .tabs{flex-direction:row;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{white-space:nowrap}
  .cap-title{font-size:22px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button class="btn" id="toggle"><i class="ti ti-maximize" aria-hidden="true"></i> present view</button>
  </div>

  <div class="card">
    <div class="franja"></div>
    <div class="layout">
      <nav class="nav">
        <div class="nav-head"><div class="ic"><i class="ti ti-books" aria-hidden="true"></i></div><span id="tema-nombre">[Nombre del tema]</span></div>
        <div class="tabs" id="tabs"></div>
      </nav>
      <div class="stage" id="stage"></div>
    </div>
    <div class="prow" id="prow">
      <button class="parrow" data-d="-1"><i class="ti ti-chevron-left" aria-hidden="true"></i> anterior</button>
      <span class="dots" id="dots"></span>
      <button class="parrow" data-d="1">siguiente <i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
  </div>
  <div class="foot">Cooperativa Notebook — Oliver Ayala</div>
</div>

<script>
/* ===== CAPS: única fuente de verdad. Una entrada = una cápsula (un tab). =====
   - portada:true  → la diseña el facilitador (primera, especial)
   - resto: eyebrow, title, icon, body, cards[[t,s]...], art, law (literal) */
const TEMA = "[Nombre del tema]";
const CAPS = [
  { portada:true, label:"Portada", icon:"ti-photo",
    marca:"Cooperativa Notebook", h1:"[Título del tema]",
    p:"[Bajada de la portada — la diseñás vos.]" },

  { label:"[Título cápsula 1]", icon:"ti-scale", eyebrow:"[Tema]",
    title:"[Título cápsula 1]",
    body:"[Cuerpo, máx 4–5 líneas.]",
    cards:[["[Sub-bloque]","[glosa corta]"],["[Sub-bloque]","[glosa]"],["[Sub-bloque]","[glosa]"]],
    art:"Artículo NN · Ley de Cooperativas de Honduras",
    law:"“[Texto literal verbatim del artículo.]”" }
  /* + más cápsulas; recordá: una fuente legal por cápsula */
];

const $=s=>document.querySelector(s);
let idx=0, present=false;

function renderCap(c){
  if(c.portada){
    return '<div class="portada"><div class="logo"><i class="ti ti-books" aria-hidden="true"></i></div>'+
      '<div class="marca">'+c.marca+'</div><h1>'+c.h1+'</h1><p>'+c.p+'</p></div>';
  }
  var cards=(c.cards||[]).map(p=>'<div class="mini"><div class="t">'+p[0]+'</div><div class="s">'+p[1]+'</div></div>').join('');
  return '<div class="cap-head"><div class="cap-ic"><i class="ti '+c.icon+'" aria-hidden="true"></i></div>'+
    '<div><div class="eyebrow">'+c.eyebrow+'</div><div class="cap-title">'+c.title+'</div></div></div>'+
    '<p class="cap-body">'+c.body+'</p>'+
    (cards?'<div class="cap-cards">'+cards+'</div>':'')+
    '<div class="legal"><div class="legal-lab"><i class="ti ti-gavel" aria-hidden="true"></i> Fuente legal</div>'+
    '<div class="legal-art">'+c.art+'</div><div class="legal-txt">'+c.law+'</div></div>';
}
function paintTabs(){
  document.querySelectorAll('#tabs .tab').forEach((b,j)=>b.classList.toggle('on',j===idx));
}
function paintDots(){
  var d=$('#dots'); d.innerHTML='';
  CAPS.forEach((_,j)=>{var s=document.createElement('span');s.className='dot'+(j===idx?' on':'');d.appendChild(s);});
}
function render(){
  $('#stage').innerHTML=renderCap(CAPS[idx]);
  paintTabs(); if(present) paintDots();
}
function setMode(p){
  present=p;
  document.body.classList.toggle('present',p);
  var t=$('#toggle');
  t.innerHTML=p?'<i class="ti ti-minimize" aria-hidden="true"></i> salir':'<i class="ti ti-maximize" aria-hidden="true"></i> present view';
  if(p && document.documentElement.requestFullscreen){ document.documentElement.requestFullscreen().catch(()=>{}); }
  if(!p && document.fullscreenElement){ document.exitFullscreen().catch(()=>{}); }
  render();
}
function go(i){ idx=(i+CAPS.length)%CAPS.length; render(); }

/* build tabs */
(function(){
  $('#tema-nombre').textContent=TEMA;
  var tabs=$('#tabs');
  CAPS.forEach((c,i)=>{
    var b=document.createElement('button');
    b.className='tab';
    b.innerHTML='<span class="bar"></span><i class="ti '+c.icon+'" style="font-size:16px" aria-hidden="true"></i><span>'+c.label+'</span>';
    b.addEventListener('click',()=>go(i));
    tabs.appendChild(b);
  });
  document.querySelectorAll('.parrow').forEach(b=>b.addEventListener('click',()=>go(idx+ +b.dataset.d)));
  $('#toggle').addEventListener('click',()=>setMode(!present));
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight') go(idx+1);
    else if(e.key==='ArrowLeft') go(idx-1);
    else if(e.key==='Escape' && present) setMode(false);
  });
  render();
})();
</script>
</body>
</html>
