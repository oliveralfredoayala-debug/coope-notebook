<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoopeNotebook · KB Lecciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --carbon: #f2efe8;
  --carbon-2: #ffffff;
  --linea: #d9d3c7;
  --hueso: #1a2e22;
  --hueso-2: #4a5d4e;
  --hueso-3: #7d7763;
  --fuego: #234a35;
  --fuego-2: #1a3628;
  --card-shadow: 0 4px 20px rgba(26,46,34,0.04), 0 2px 8px rgba(0,0,0,0.02);
  --card-shadow-hover: 0 12px 30px rgba(26,46,34,0.08), 0 4px 12px rgba(0,0,0,0.03);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--carbon); color: var(--hueso); font-size: 16px; line-height: 1.6; }
h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: -0.01em; }

.app { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 0 22px; }

.topbar { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--linea); position: sticky; top: 0; background: rgba(242,239,232,0.85); backdrop-filter: blur(10px); z-index: 20; cursor: pointer; }
.topbar:hover { opacity: 0.9; }
.logo { width: auto; height: 40px; display: flex; align-items: center; }
.logo img { height: 100%; object-fit: contain; width: auto; }
.brand { font-size: 17px; font-weight: 700; color: var(--fuego); }

.header { padding: 40px 0 30px; }
.h-big { font-size: 34px; line-height: 1.1; margin-bottom: 12px; color: var(--fuego); }
.subtitle { color: var(--hueso-2); font-size: 16px; max-width: 640px; }

.bloque { margin-bottom: 60px; }
.bloque-titulo { font-size: 28px; font-weight: 700; color: var(--fuego); margin-bottom: 24px; font-family: 'Space Grotesk'; }
.bloque-descripcion { color: var(--hueso-2); font-size: 15px; margin-bottom: 30px; }

.acordeones { display: flex; flex-direction: column; gap: 16px; }

.acordeon { background: var(--carbon-2); border: 1px solid var(--linea); border-radius: 16px; overflow: hidden; box-shadow: var(--card-shadow); }

.acordeon-header { 
  padding: 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; 
  transition: 0.15s; user-select: none;
}
.acordeon:hover .acordeon-header { background: rgba(35,74,53,0.04); }
.acordeon-header:hover { border-color: var(--fuego-2); }

.acordeon-titulo { font-size: 18px; font-weight: 600; color: var(--fuego); margin: 0; }
.acordeon-toggle { font-size: 20px; color: var(--fuego-2); transition: 0.2s; }
.acordeon.open .acordeon-toggle { transform: rotate(180deg); }

.acordeon-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.acordeon.open .acordeon-body { max-height: 1000px; }

.capsulas { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 12px; }
.capsula { 
  padding: 12px 16px; background: rgba(35,74,53,0.04); border-left: 3px solid var(--fuego); 
  border-radius: 4px; cursor: pointer; transition: 0.15s;
}
.capsula:hover { background: rgba(35,74,53,0.08); transform: translateX(4px); }
.capsula-titulo { font-size: 14px; font-weight: 500; color: var(--fuego); }

.footer { padding: 40px 22px 20px; color: var(--hueso-3); font-size: 12px; border-top: 1px solid var(--linea); margin-top: 60px; text-align: center; }

@media (max-width: 820px) {
  .h-big { font-size: 24px; }
  .bloque-titulo { font-size: 22px; }
  .acordeon-titulo { font-size: 16px; }
}
</style>
</head>
<body>

<div class="app">
  <a href="/" style="text-decoration: none; color: inherit;">
    <div class="topbar">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="15" y="20" width="70" height="60" rx="8" fill="#1a5c3a"/>
          <line x1="30" y1="35" x2="70" y2="35" stroke="#d4a520" stroke-width="2"/>
        </svg>
      </div>
      <div class="brand">CoopeNotebook</div>
    </div>
  </a>

  <section class="header">
    <h1 class="h-big">KB · Lecciones</h1>
    <p class="subtitle">Cápsulas de contenido disponibles para armar talleres con Jester</p>
  </section>

  <div id="contenido"></div>

  <footer class="footer">
    <p><strong>CoopeNotebook</strong></p>
    <p>Creado por Oliver Ayala</p>
    <p>© All rights reserved</p>
  </footer>
</div>

<script>
async function cargarKB() {
  try {
    const resp = await fetch('/data/kb-index.json');
    const data = await resp.json();
    renderizar(data);
  } catch (err) {
    console.error('Error cargando KB:', err);
    document.getElementById('contenido').innerHTML = '<p style="color: red; padding: 20px;">Error cargando índice</p>';
  }
}

function renderizar(data) {
  const container = document.getElementById('contenido');
  let html = '';

  data.bloques.forEach(bloque => {
    html += `<div class="bloque">
      <h2 class="bloque-titulo">${bloque.titulo}</h2>
      <p class="bloque-descripcion">${bloque.descripcion || ''}</p>
      <div class="acordeones">`;

    bloque.acordeones.forEach((acordeon, idx) => {
      html += `<div class="acordeon" data-acordeon="${acordeon.id}">
        <div class="acordeon-header" onclick="toggleAcordeon(this)">
          <h3 class="acordeon-titulo">${acordeon.titulo}</h3>
          <span class="acordeon-toggle">▼</span>
        </div>
        <div class="acordeon-body">
          <div class="capsulas">`;

      acordeon.capsulas.forEach(capsula => {
        html += `<div class="capsula" onclick="abrirCapsula('${capsula.id}')">
          <div class="capsula-titulo">${capsula.titulo}</div>
        </div>`;
      });

      html += `</div>
        </div>
      </div>`;
    });

    html += `</div>
    </div>`;
  });

  container.innerHTML = html;
}

function toggleAcordeon(header) {
  const acordeon = header.parentElement;
  acordeon.classList.toggle('open');
}

function abrirCapsula(id) {
  // Por ahora solo log — después se abrirá el archivo
  console.log('Abrir cápsula:', id);
  alert('Cápsula: ' + id + ' (proximamente)');
}

// Cargar al abrir
document.addEventListener('DOMContentLoaded', cargarKB);
</script>

</body>
</html>
