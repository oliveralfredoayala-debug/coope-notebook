<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psicología del conflicto (Teoría) · Contenido para revisión · CoopeNotebook</title>
<style>
:root{
  --verde:#234a35; --verde-sec:#2f7d52; --ambar:#f0a226; --ambar-txt:#9a6a12;
  --lila:#7d6a9c; --lila-txt:#5a4a78; --lila-bg:rgba(125,106,156,.08); --lila-line:rgba(125,106,156,.3);
  --tinta:#1a2421; --tinta-2:#52615b; --tinta-3:#7d7763;
  --blanco:#fff; --niebla:#f6f8f7; --niebla-2:#fbfcfb; --linea:#e7ece9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--niebla);color:var(--tinta);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto;padding:32px 24px 80px}

/* documento de revisión — NO es presentación: legible, lineal, editable */
.doc-head{border-bottom:2px solid var(--verde);padding-bottom:18px;margin-bottom:8px}
.doc-kicker{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--verde-sec)}
.doc-title{font-size:26px;font-weight:700;color:var(--verde);margin-top:6px;line-height:1.2}
.doc-note{font-size:13px;color:var(--tinta-3);margin-top:10px}

.cap{background:var(--blanco);border:1px solid var(--linea);border-radius:14px;padding:24px 26px;margin-top:24px}
.cap-num{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ambar-txt)}
.cap-titulo{font-size:21px;font-weight:700;color:var(--tinta);margin-top:3px}
.cap-meta{font-size:13px;color:var(--tinta-2);margin-top:10px;padding:12px 14px;background:var(--niebla-2);border-radius:10px;border-left:3px solid var(--ambar)}
.cap-meta b{color:var(--ambar-txt);font-weight:700}

.tab{border-top:1px solid var(--linea);margin-top:20px;padding-top:18px}
.tab-num{font-size:11px;font-weight:600;color:var(--tinta-3);letter-spacing:.05em}
.tab-nombre{font-size:17px;font-weight:600;color:var(--verde);margin-top:2px}
.tab-texto{font-size:15px;color:var(--tinta);margin-top:10px}
.tab-texto p+p{margin-top:8px}

.bloque-lab{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.lab-cards{color:var(--verde-sec)}
.lab-acc{color:var(--verde-sec)}
.lab-hl{color:var(--ambar-txt)}
.lab-legal{color:var(--lila-txt)}

.rev-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rev-mini{background:var(--niebla);border-radius:9px;padding:10px 12px;border-top:2px solid var(--verde-sec)}
.rev-mini b{font-size:13px;color:var(--verde);display:block}
.rev-mini span{font-size:13px;color:var(--tinta-2)}

.rev-acc{display:flex;flex-direction:column;gap:6px}
.rev-acc-item{background:var(--niebla);border-radius:9px;padding:10px 12px}
.rev-acc-item b{font-size:14px;color:var(--verde);display:block}
.rev-acc-item span{font-size:14px;color:var(--tinta-2)}

.rev-hl{background:linear-gradient(180deg,rgba(240,162,38,.1),rgba(240,162,38,.04));border:1px solid rgba(240,162,38,.3);border-left:4px solid var(--ambar);border-radius:10px;padding:12px 15px;font-size:15px;color:var(--tinta);font-weight:500}

.rev-legal{background:var(--lila-bg);border:1px solid var(--lila-line);border-radius:10px;padding:12px 15px}
.rev-legal .art{font-size:13px;font-weight:700;color:var(--lila-txt)}
.rev-legal .sub{font-size:11.5px;color:var(--tinta-3);margin-bottom:7px}
.rev-legal .txt{font-size:14px;color:var(--tinta);line-height:1.7;white-space:pre-line}
.rev-legal .verif{font-size:11px;color:var(--tinta-3);margin-top:8px;padding-top:7px;border-top:1px solid var(--lila-line)}

.foot{font-size:12px;color:var(--tinta-3);text-align:center;margin-top:40px}
@media print{body{background:#fff}.cap{break-inside:avoid}}
</style>
</head>
<body>
<div class="wrap">
  <div class="doc-head">
    <div class="doc-kicker">CoopeNotebook · Documento de revisión</div>
    <div class="doc-title" id="docTitle">[Tema]</div>
    <div class="doc-note">Vista solo-contenido para revisión y edición. No es la presentación del taller: aquí se audita el texto, los sub-bloques y la fuente legal de cada cápsula. La misma estructura de datos (<code>CAPS</code>) alimenta la presentación.</div>
  </div>
  <div id="docu"></div>
  <div class="foot">CoopeNotebook</div>
</div>

<script>
/* ============================================================
   MISMA FUENTE DE DATOS que la presentación: copiar el bloque
   CAPS y ARTICULOS idéntico al del HTML de presentación.
   Este archivo NO añade ni quita contenido: lo expone para revisar.
   ============================================const TEMA = "Habilidades y estrategias para mediación";

const LEY = {};
const ARTICULOS = {};

const CAPS = [
  {
    icon: "ti-users",
    eyebrow: "MEDIACIÓN EN COOPERATIVAS",
    titulo: "Habilidades y estrategias para mediación",
    preguntaCentral: "¿Qué habilidades necesito para facilitar un conflicto entre otros?",
    jester: "Facilitar la comunicación entre dos partes exige del mediador una escucha limpia, neutralidad activa y la asertividad para proteger el espacio de diálogo.",
    tabs: [
      {
        nombre: "Simpatía, juicio y empatía",
        texto: "<p>El mediador recibe relatos cargados emocionalmente. Ante ellos, tiende a responder desde uno de estos tres lugares. Solo uno permite mantenerse neutral y comprender a ambas partes sin perder claridad.</p>",
        cards: [
          ["Simpatía", "Conexión emocional con una de las partes. Humana y comprensible — pero compromete la neutralidad del mediador sin que se dé cuenta."],
          ["Juicio", "Conclusión prematura sobre quién tiene razón. Cierra la comprensión antes de tiempo y convierte al mediador en árbitro."],
          ["Empatía", "Comprender el marco interno de cada parte sin apropiarse de su experiencia ni tomar partido. La habilidad central del mediador."]
        ],
        highlight: "La empatía no consiste en sentir lo mismo, sino en comprender el mundo del otro sin convertirlo en el nuestro. — Carl Rogers"
      },
      {
        nombre: "Leer el estado interno",
        texto: "<p>Antes de facilitar, el mediador necesita comprender qué está pasando realmente en cada parte. Esta secuencia permite leer a una persona más allá de lo que dice — sin diagnosticarla, sino para entender por qué actúa como actúa.</p>",
        acordeon: [
          ["1. Conducta", "Participación, energía, iniciativa, compromiso, consistencia."],
          ["2. Emoción", "Entusiasmo, frustración, miedo, inseguridad, enojo, esperanza."],
          ["3. Narrativa", "Supuestos, creencias e historias internas con que la persona se cuenta lo que vive."],
          ["4. Atención", "Hacia dónde mira: riesgos, oportunidades, obstáculos, recursos."],
          ["5. Capacidad percibida", "Confianza, autoeficacia y límites que se atribuye a sí misma."],
          ["Acción", "Lo que la persona decide y hace, como resultado de cómo interpreta la realidad."]
        ],
        highlight: "La conducta de una persona difícil se entiende distinto cuando se leen su narrativa interna y lo que cree sobre su propia capacidad."
      },
      {
        nombre: "Escucha activa",
        texto: "<p>En mediación, la escucha no es pasiva — es la intervención principal del facilitador. Estas cuatro habilidades permiten que cada parte sienta que fue comprendida antes de buscar soluciones.</p>",
        acordeon: [
          ["Atención plena", "Presencia total con quien está hablando. Las partes detectan si el mediador está realmente atento o procesando mentalmente su próxima pregunta. La atención plena no es técnica — es una decisión de estar."],
          ["Parafraseo", "Devolver con otras palabras lo que la parte expresó. No para repetir — para confirmar comprensión. Cuando alguien se siente parafraseado correctamente, baja la guardia y habla con más profundidad. Es también una señal de neutralidad: el mediador entiende a ambos."],
          ["Clarificación", "Preguntar para entender mejor, no para debatir. \"¿Entendí correctamente que...?\" — esta pregunta señala que la parte está siendo atendida, y eso por sí solo reduce la tensión en la sala."],
          ["Escucha empática", "Comprender sin necesariamente estar de acuerdo. En mediación esto es crítico: el facilitador puede entender perfectamente por qué cada parte siente lo que siente, sin validar que alguna tiene razón. Esa distinción mantiene la neutralidad."]
        ],
        highlight: "Las personas son más propensas a cooperar cuando se sienten comprendidas — no cuando se sienten convencidas."
      },
      {
        nombre: "El error común",
        texto: "<p>El mediador inexperto escucha para encontrar quién tiene razón. El mediador con experiencia escucha para comprender qué necesita cada parte. Ese cambio de objetivo transforma completamente la dinámica de la sesión.</p>",
        cards: [
          ["Escuchar para resolver", "El mediador ya está construyendo la solución mientras la parte habla. Capta solo lo que confirma su lectura del conflicto. Las partes lo perciben."],
          ["Escuchar para comprender", "La única tarea mientras cada parte habla es entender su marco de referencia — sus significados, su contexto, sus necesidades reales detrás de la posición."],
          ["Señales de alerta (No escucha)", "Habla más de lo que escucha · Interrumpe para redirigir · Siente impaciencia cuando una parte se extiende."],
          ["Comunicar con propósito", "A veces el problema no es falta de diálogo, sino demasiado flujo sin dirección. El mediador hace pocas preguntas, pero las correctas."]
        ],
        highlight: "El mediador que escucha para responder compite con las partes. El que escucha para comprender facilita el espacio donde ellas mismas encuentran la salida."
      },
      {
        nombre: "Cuatro estilos",
        texto: "<p>Las partes en un conflicto llegan comunicándose desde uno de estos estilos. El mediador necesita reconocerlos para entender la dinámica — y para modelar en todo momento el único que permite avanzar.</p>",
        cards: [
          ["Pasivo", "No expresa sus necesidades. Cede para evitar conflicto. Sus intereses quedan invisibles — y acumulan resentimiento que aparece más tarde."],
          ["Agresivo", "Impone sus necesidades sin considerar las del otro. Domina el espacio de la mediación y silencia a la parte más pasiva."],
          ["Pasivo-agresivo", "Expresión indirecta. Dice que sí en la sesión pero actúa diferente afuera. Los acuerdos con esta dinámica raramente se sostienen."],
          ["Asertivo", "Expresa necesidades con claridad y respeto. El mediador modela este estilo en cada intervención — y así invita a las partes a adoptarlo."]
        ],
        highlight: "El mediador no puede pedir a las partes que sean asertivas — pero puede modelarlo. La forma en que interviene enseña más que cualquier instrucción."
      },
      {
        nombre: "Modelo CNV",
        texto: "<p>La Comunicación No Violenta (Marshall Rosenberg) ofrece una estructura de cuatro pasos que el mediador puede usar para reformular los mensajes de las partes — convirtiendo ataques en necesidades, y posiciones en intereses.</p>",
        acordeon: [
          ["1. Observación", "Describir el hecho concreto, sin juicio ni interpretación. Ejemplo: \"Cuando las reuniones inician tarde...\""],
          ["2. Sentimiento", "Nombrar lo que se siente, en primera persona. Sin acusar. Ejemplo: \"Me siento frustrado...\""],
          ["3. Necesidad", "Expresar el interés detrás del sentimiento — no la posición. Ejemplo: \"...porque necesito aprovechar el tiempo disponible.\"\\\n"],
          ["4. Petición", "Una acción concreta, expresada como pedido — no como exigencia. Ejemplo: \"Me gustaría que iniciáramos puntualmente.\""]
        ],
        highlight: "El mediador puede usar este modelo para reformular en voz alta: \"Entiendo que lo que estás diciendo es que cuando ocurre X, sentís Y, porque necesitás Z.\" Esa reformulación sola puede cambiar el tono de toda la sesión."
      },
      {
        nombre: "Asertividad en mediación",
        texto: "<p>El mediador también necesita ser asertivo — con las partes, con el proceso y con los límites de su rol. Estas son las situaciones donde esa habilidad más se pone a prueba.</p>",
        acordeon: [
          ["Redirigir sin imponer", "Cuando una parte domina o desvía la conversación, el mediador necesita intervenir con firmeza pero sin autoritarismo. \"Quiero asegurarme de escuchar también a la otra parte\" es asertivo. \"Déjelo hablar\" es agresivo. La diferencia está en el foco: el proceso, no la persona."],
          ["Señalar un incumplimiento del proceso", "Si una parte rompe las reglas acordadas — interrumpe, insulta, sale del tema — el mediador lo señala sobre el hecho, no sobre la persona. \"Acordamos escucharnos sin interrupciones\" es asertivo. \"Siempre hacés lo mismo\" cierra la sesión."],
          ["Decir que no al acuerdo prematuro", "Las partes a veces quieren cerrar rápido para salir del malestar. El mediador asertivo frena un acuerdo que no está maduro: \"Antes de cerrar, quiero asegurarme de que ambas partes entiendan exactamente lo que están comprometiendo.\" Un acuerdo frágil reaparece como conflicto."],
          ["Evitar tomar partido", "La tendencia natural es simpatizar con quien habló primero o con quien parece más afectado. El mediador asertivo reconoce esa tendencia y la nombra internamente antes de que afecte sus intervenciones. Neutralidad no es indiferencia — es disciplina."]
        ],
        highlight: "El mediador no resuelve el conflicto — facilita el espacio donde las partes lo resuelven. Su asertividad protege ese espacio, no impone la solución."
      }
    ]
  }
];

/* ============================================================ */
const esc=t=>(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");
const stripTags=t=>(t||"").replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();

function revLegal(refs){
  if(!refs||!refs.length) return "";
  return '<div class="bloque-lab lab-legal">Fuente legal</div>'+refs.map(id=>{
    const a=ARTICULOS[id]; if(!a) return '<div class="rev-legal"><div class="art">⚠ Referencia '+esc(id)+' no encontrada en ARTICULOS</div></div>';
    return '<div class="rev-legal"><div class="art">'+esc(a.num)+'</div>'+
      '<div class="sub">'+esc(LEY[a.ley]?LEY[a.ley].nombre:a.ley)+'</div>'+
      '<div class="txt">'+esc(a.texto)+'</div>'+
      '<div class="verif">☐ Verificar texto literal verbatim contra la fuente del proyecto.</div></div>';
  }).join("");
}

function revTab(t,ci,ti){
  let h='<div class="tab"><div class="tab-num">Tab '+(ti+1)+'</div>'+
    '<div class="tab-nombre">'+esc(t.nombre)+'</div>'+
    '<div class="tab-texto">'+t.texto+'</div>';
  if(t.cards&&t.cards.length){
    h+='<div class="bloque-lab lab-cards">Sub-bloques (cards)</div><div class="rev-cards">'+
      t.cards.map(p=>'<div class="rev-mini"><b>'+esc(p[0])+'</b><span>'+esc(p[1])+'</span></div>').join('')+'</div>';
  }
  if(t.acordeon&&t.acordeon.length){
    h+='<div class="bloque-lab lab-acc">Sub-bloques (acordeón)</div><div class="rev-acc">'+
      t.acordeon.map(p=>'<div class="rev-acc-item"><b>'+esc(p[0])+'</b><span>'+esc(p[1])+'</span></div>').join('')+'</div>';
  }
  if(t.highlight){
    h+='<div class="bloque-lab lab-hl">Para recordar</div><div class="rev-hl">'+esc(t.highlight)+'</div>';
  }
  h+=revLegal(t.legalRefs);
  return h+'</div>';
}

(function(){
  document.getElementById('docTitle').textContent=TEMA;
  document.title=TEMA+' · Contenido para revisión · CoopeNotebook';
  let html='';
  CAPS.forEach((c,ci)=>{
    html+='<div class="cap"><div class="cap-num">Cápsula '+(ci+1)+'</div>'+
      '<div class="cap-titulo">'+esc(c.titulo)+'</div>'+
      '<div class="cap-meta"><b>Apertura · Pregunta central:</b> '+esc(c.preguntaCentral)+
      '<br><b>Jester:</b> '+esc(c.jester)+'</div>';
    c.tabs.forEach((t,ti)=>{ html+=revTab(t,ci,ti); });
    html+='</div>';
  });
  document.getElementById('docu').innerHTML=html;
})();
</script>
</body>
</html>
