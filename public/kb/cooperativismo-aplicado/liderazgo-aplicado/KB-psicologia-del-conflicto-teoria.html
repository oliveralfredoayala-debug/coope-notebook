<style>
:root{
  --verde:#234a35; --verde-sec:#2f7d52; --ambar:#f0a226; --ambar-txt:#9a6a12;
  --lila:#7d6a9c; --lila-txt:#5a4a78; --lila-bg:rgba(125,106,156,.08); --lila-bg2:rgba(125,106,156,.13); --lila-line:rgba(125,106,156,.3);
  --tinta:#1a2421; --tinta-2:#52615b; --tinta-3:#7d7763;
  --blanco:#fff; --niebla:#f6f8f7; --niebla-2:#fbfcfb; --linea:#e7ece9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--niebla);color:var(--tinta);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2{font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:-.01em}
.wrap{max-width:1350px;min-height:calc(100vh - 36px);margin:0 auto;padding:18px;display:flex;flex-direction:column}

/* ===== barra superior: home (logo) + flechas de página ===== */
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.home{display:flex;align-items:center;gap:9px;cursor:pointer;border:none;background:transparent;padding:6px 8px;border-radius:10px;transition:.15s}
.home:hover{background:rgba(35,74,53,.06)}
.home img{height:34px;width:auto;display:block}
.page-nav{display:flex;align-items:center;gap:6px;margin-left:auto}
.pbtn{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--linea);background:#fff;color:var(--tinta-2);border-radius:9px;padding:8px 13px;min-height:40px;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.pbtn:hover{border-color:var(--verde-sec);color:var(--verde)}
.btn{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--verde);background:var(--verde);color:#fff;border-radius:9px;padding:9px 15px;min-height:40px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:#1a2e22}

.card{flex:1;display:flex;flex-direction:column;background:var(--blanco);border:1px solid var(--linea);border-radius:16px;overflow:hidden;position:relative}
.franja{height:5px;background:linear-gradient(90deg,var(--verde),var(--verde-sec) 55%,var(--ambar))}
.layout{flex:1;display:flex;min-height:500px}

/* ===== árbol estático (cápsulas + tabs siempre visibles) ===== */
.nav{width:252px;flex-shrink:0;border-right:1px solid var(--linea);padding:16px 12px;background:var(--niebla-2);display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.nav-lab{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tinta-3);padding:2px 8px 8px}
.cap-group{margin-bottom:6px}
.cap-node{position:relative;font-family:inherit;font-size:13px;cursor:pointer;border:none;border-radius:9px;padding:10px 10px 10px 13px;background:transparent;color:var(--tinta);font-weight:600;display:flex;align-items:center;gap:8px;text-align:left;width:100%;min-height:42px}
.cap-node:hover{background:var(--niebla)}
.cap-node>i{font-size:16px;flex-shrink:0;color:var(--verde)}
.cap-node.active{color:var(--verde);background:rgba(35,74,53,.06)}
.tab-branch{display:flex;flex-direction:column;gap:1px;padding:3px 0 4px;margin-left:14px;border-left:1.5px solid var(--linea)}
.tab-leaf{position:relative;font-family:inherit;font-size:12.5px;cursor:pointer;border:none;background:transparent;color:var(--tinta-2);border-radius:7px;padding:8px 12px 8px 16px;text-align:left;width:100%;min-height:38px;display:flex;align-items:center;gap:7px;transition:.12s}
.tab-leaf:hover{background:var(--niebla);color:var(--verde)}
.tab-leaf.on{background:rgba(35,74,53,.09);color:var(--verde);font-weight:600}
.tab-leaf.on::before{content:"";position:absolute;left:-1.5px;top:50%;transform:translateY(-50%);width:2px;height:22px;background:var(--ambar)}
.tab-leaf i{font-size:14px;flex-shrink:0}
.tab-leaf.intro{color:var(--ambar-txt)}
.tab-leaf.intro.on{background:rgba(240,162,38,.12)}

.col{flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto}
.stage{padding:28px 32px 32px;flex:1;position:relative;z-index:1}

/* apertura con Jester */
.intro-box{padding:6px 0}
.intro-q{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:600;color:var(--tinta);line-height:1.22}
.jester{display:flex;gap:18px;align-items:flex-end;margin-top:28px}

.bubble{position:relative;background:#fff;border:1.5px solid var(--verde-sec);border-radius:16px;padding:15px 18px;max-width:520px}
.bubble::before,.bubble::after{content:"";position:absolute;left:-13px;bottom:14px;width:0;height:0;border-style:solid}
.bubble::before{border-width:9px 13px 9px 0;border-color:transparent var(--verde-sec) transparent transparent}
.bubble::after{border-width:7px 10px 7px 0;border-color:transparent #fff transparent transparent;left:-9px;bottom:16px}
.bubble .jn{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--verde-sec)}
.bubble .jt{font-size:15px;color:var(--tinta);margin-top:4px;line-height:1.6}

.cap-head{display:flex;align-items:flex-start;gap:12px}
.cap-ic{width:38px;height:38px;border-radius:10px;background:rgba(35,74,53,.08);display:flex;align-items:center;justify-content:center;color:var(--verde);flex-shrink:0;font-size:20px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--verde-sec)}
.cap-title{font-size:24px;font-weight:600;color:var(--tinta);line-height:1.15;margin-top:2px}
.cap-body{font-size:16px;line-height:1.7;color:var(--tinta);margin-top:18px}
.cap-body p+p{margin-top:12px}

.cap-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-top:18px}
.mini{background:var(--niebla);border-radius:11px;padding:13px 15px;border-top:2px solid var(--verde-sec)}
.mini .t{font-size:13px;font-weight:600;color:var(--verde)}
.mini .s{font-size:13px;color:var(--tinta-2);margin-top:4px;line-height:1.55}

.acc{margin-top:18px;display:flex;flex-direction:column;gap:8px}
.acc-item{border:1px solid var(--linea);border-radius:11px;overflow:hidden;background:var(--blanco)}
.acc-q{font-family:inherit;width:100%;text-align:left;cursor:pointer;border:none;background:var(--niebla-2);padding:13px 16px;font-size:14px;font-weight:600;color:var(--verde);display:flex;justify-content:space-between;align-items:center;gap:10px;min-height:46px}
.chev{display:inline-block;transition:.2s;font-size:18px;line-height:1}
.acc-q .chev{color:var(--tinta-3)}
.acc-item.open .acc-q .chev{transform:rotate(90deg)}
.acc-a{font-size:14px;color:var(--tinta-2);line-height:1.6;max-height:0;overflow:hidden;transition:max-height .25s ease,padding .25s ease;padding:0 16px}
.acc-item.open .acc-a{max-height:320px;padding:13px 16px}

.highlight{margin-top:22px;background:linear-gradient(180deg,rgba(240,162,38,.1),rgba(240,162,38,.04));border:1px solid rgba(240,162,38,.3);border-radius:14px;padding:16px 18px 16px 20px;position:relative}
.highlight::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:4px;background:var(--ambar)}
.highlight .hl-lab{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ambar-txt);margin-bottom:7px}
.highlight .ht{font-size:15.5px;color:var(--tinta);line-height:1.6;font-weight:500}

.legal{margin-top:22px;background:var(--lila-bg);border:1px solid var(--lila-line);border-radius:12px;overflow:hidden}
.legal-head{display:flex;align-items:center;gap:9px;padding:13px 16px;background:var(--lila-bg2)}
.legal-seal{width:30px;height:30px;border-radius:7px;background:var(--lila);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.legal-art{font-size:13px;font-weight:700;color:var(--lila-txt)}
.legal-sub{font-size:11.5px;color:var(--tinta-3);margin-top:1px}
.legal-acc-q{margin-left:auto;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--lila);background:#fff;color:var(--lila-txt);border-radius:8px;padding:7px 12px;min-height:36px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.legal-acc-q:hover{background:var(--lila-bg)}
.legal-acc-q .chev{transition:.2s}
.legal.open .legal-acc-q .chev{transform:rotate(90deg)}
.legal-body{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;padding:0 16px;font-size:14px;line-height:1.7;color:var(--tinta);white-space:pre-line}
.legal.open .legal-body{max-height:600px;padding:14px 16px 16px}
.legal-src{font-size:11.5px;color:var(--tinta-3);margin-top:12px;padding-top:10px;border-top:1px solid var(--lila-line)}

/* present mode */
.prow{display:none;align-items:center;justify-content:space-between;padding:14px 26px;border-top:1px solid var(--linea);background:var(--niebla-2);position:relative;z-index:3}
.parrow{font-family:inherit;font-size:14px;cursor:pointer;border:1px solid var(--linea);background:#fff;color:var(--tinta);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:7px;min-height:46px}
.parrow:hover{border-color:var(--verde-sec)}
.dots{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:60%}
.dot{width:9px;height:9px;border-radius:50%;background:#d7ddd9}
.dot.on{background:var(--verde)}

/* hojas decorativas (solo present view) */
.leaf-deco{display:none;position:absolute;pointer-events:none;opacity:.5;z-index:0}
body.present .leaf-deco{display:block}
.leaf-deco.l1{top:-30px;right:-20px;width:230px;transform:rotate(15deg);opacity:.4}
.leaf-deco.l2{bottom:60px;left:-40px;width:190px;transform:rotate(-25deg);opacity:.35}
.leaf-deco.l3{top:40%;right:-30px;width:120px;transform:rotate(40deg);opacity:.25}

body.present .wrap{max-width:100%;padding:0}
body.present .nav{display:none}
body.present .card{border-radius:0;border:none;min-height:100vh}
body.present .col{min-height:calc(100vh - 5px - 76px)}
body.present .stage{padding:56px 8vw;display:flex;flex-direction:column;justify-content:center}
body.present .prow{display:flex}
body.present .topbar{position:fixed;top:14px;right:14px;margin:0;z-index:10;background:rgba(255,255,255,.85);padding:6px 10px;border-radius:12px;backdrop-filter:blur(4px)}
body.present .topbar .home,body.present .topbar .page-nav{display:none}
body.present .intro-q{font-size:46px}
body.present .jester-av{width:150px;height:150px}
body.present .bubble{max-width:60vw}
body.present .bubble .jt{font-size:24px}
body.present .cap-ic{width:56px;height:56px;font-size:30px}
body.present .eyebrow{font-size:16px}
body.present .cap-title{font-size:42px}
body.present .cap-body{font-size:25px;margin-top:26px}
body.present .highlight{padding:22px 26px;margin-top:28px}
body.present .highlight .ht{font-size:24px}
body.present .legal-art{font-size:17px}
body.present .legal-body{font-size:20px}
body.present .slide-list li{font-size:28px;margin-top:18px}

.slide-list{list-style:none;margin-top:24px}
.slide-list li{font-size:18px;line-height:1.4;color:var(--tinta);padding-left:32px;position:relative;margin-top:13px}
.slide-list li::before{content:"";position:absolute;left:6px;top:.55em;width:10px;height:10px;border-radius:3px;background:var(--ambar)}

@media (max-width:820px){
  .layout{flex-direction:column}
  .nav{width:auto;border-right:none;border-bottom:1px solid var(--linea)}
  .cap-title{font-size:21px}
  .jester{flex-direction:column;align-items:flex-start;gap:10px}
  .bubble::before,.bubble::after{display:none}
}

/* Custom CSS styling overrides for the card grid, interactive timeline, Thomas-Kilmann matrix, images, and presentation mode font sizes */
.cap-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 20px;
  margin-top: 24px;
}
.mini {
  background: var(--blanco);
  border: 1.5px solid var(--linea);
  border-radius: 16px;
  padding: 24px 20px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.15s, box-shadow 0.15s;
}
.mini:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(35, 74, 53, 0.06);
  border-color: var(--verde-sec);
}
.mini-icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(35, 74, 53, 0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  color: var(--verde);
  flex-shrink: 0;
}
.mini-icon svg {
  width: 32px;
  height: 32px;
}
.mini .t {
  font-size: 15.5px;
  font-weight: 700;
  color: var(--verde);
  margin-bottom: 8px;
  line-height: 1.3;
}
.mini .s {
  font-size: 13.5px;
  color: var(--tinta-2);
  line-height: 1.5;
  margin-top: 0;
}

/* Image Container */
.tab-image-container {
  margin: 20px 0;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--linea);
  box-shadow: var(--card-shadow);
}
.tab-image {
  width: 100%;
  height: auto;
  max-height: 600px;
  object-fit: contain;
  display: block;
}

/* Plain Timeline Badge Overrides */
.tl-badge.plain {
  background: transparent !important;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tl-badge.plain::after {
  content: "";
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: block;
  transition: transform 0.15s;
}
.tl-item:hover .tl-badge.plain::after {
  transform: scale(1.25);
}
.tl-step-green .tl-badge.plain::after {
  background: var(--verde-sec);
  box-shadow: 0 0 0 4px rgba(47, 125, 82, 0.15);
}
.tl-step-amber .tl-badge.plain::after {
  background: var(--ambar);
  box-shadow: 0 0 0 4px rgba(240, 162, 38, 0.15);
}
.tl-step-red .tl-badge.plain::after {
  background: var(--lila);
  box-shadow: 0 0 0 4px rgba(125, 106, 156, 0.15);
}

/* Visual Timeline Styles */
.timeline-wrapper {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-top: 24px;
  position: relative;
  padding-left: 16px;
}
.timeline-wrapper::before {
  content: "";
  position: absolute;
  left: 31px;
  top: 10px;
  bottom: 10px;
  width: 3px;
  background: var(--linea);
}
.tl-item {
  display: flex;
  gap: 20px;
  position: relative;
  transition: transform 0.15s;
}
.tl-item:hover {
  transform: translateX(4px);
}
.tl-badge {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  z-index: 2;
  flex-shrink: 0;
  transition: transform 0.15s;
}
.tl-step-green .tl-badge {
  background: var(--verde-sec);
}
.tl-step-amber .tl-badge {
  background: var(--ambar);
}
.tl-step-red .tl-badge {
  background: var(--lila);
}
.tl-content {
  flex: 1;
  background: var(--niebla-2);
  border: 1px solid var(--linea);
  border-radius: 12px;
  padding: 14px 18px;
}
.tl-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--verde);
  margin-bottom: 6px;
}
.tl-desc {
  font-size: 14px;
  color: var(--tinta-2);
  line-height: 1.45;
}

/* Thomas-Kilmann Matrix Styles */
.matrix-grid {
  margin-top: 24px;
  border: 1px solid var(--linea);
  border-radius: 16px;
  background: var(--niebla-2);
  padding: 20px;
  overflow-x: auto;
}
.matrix-axis-y {
  font-size: 11px;
  font-weight: 700;
  color: var(--tinta-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
  text-align: center;
}
.matrix-container {
  min-width: 540px;
}
.matrix-header-x {
  font-size: 11px;
  font-weight: 700;
  color: var(--tinta-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
  text-align: center;
}
.matrix-cells {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  position: relative;
}
.matrix-cell {
  background: var(--blanco);
  border: 1px solid var(--linea);
  border-radius: 12px;
  padding: 16px;
  transition: all 0.15s;
  min-height: 110px;
}
.matrix-cell:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.03);
}
.matrix-cell.t-comprometer {
  grid-column: span 2;
  background: rgba(240,162,38,0.05);
  border-color: rgba(240,162,38,0.3);
}
.matrix-cell.t-comprometer:hover {
  border-color: var(--ambar);
}
.matrix-cell.t-colaborar {
  border-left: 4px solid var(--verde-sec);
}
.matrix-cell.t-competir {
  border-left: 4px solid var(--lila);
}
.matrix-cell.t-complacer {
  border-left: 4px solid var(--ambar);
}
.matrix-cell.t-evitar {
  border-left: 4px solid var(--tinta-3);
}
.cell-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--verde);
  margin-bottom: 6px;
}
.cell-desc {
  font-size: 13px;
  color: var(--tinta-2);
  line-height: 1.4;
}

/* Presentation Mode Font Overrides */
body.present .intro-q{font-size:58px}
body.present .jester-av{width:160px;height:160px}
body.present .bubble{max-width:65vw}
body.present .bubble .jt{font-size:28px}
body.present .cap-ic{width:64px;height:64px;font-size:34px}
body.present .eyebrow{font-size:20px}
body.present .cap-title{font-size:52px}
body.present .cap-body{font-size:28px;margin-top:30px;line-height:1.5}
body.present .highlight{padding:28px 32px;margin-top:32px}
body.present .highlight .ht{font-size:28px}
body.present .legal-art{font-size:20px}
body.present .legal-body{font-size:22px}
body.present .slide-list li{font-size:32px;margin-top:20px}
body.present .mini-icon{width:80px;height:80px;margin-bottom:22px}
body.present .mini-icon svg{width:44px;height:44px}
body.present .mini .t{font-size:24px;margin-bottom:14px}
body.present .mini .s{font-size:18px;line-height:1.6}
body.present .tl-badge{width:44px;height:44px;font-size:18px}
body.present .tl-badge.plain::after{width:20px;height:20px}
body.present .tl-title{font-size:24px}
body.present .tl-desc{font-size:18px}
body.present .cell-title{font-size:22px}
body.present .cell-desc{font-size:16px}
</style>

  {

    preguntaCentral: "¿Cómo se construye el conflicto en nuestra mente, en nuestro cuerpo y en nuestros grupos antes de intentar resolverlo?",
    jester: "El conflicto no surge de la nada; es una construcción activa de nuestra percepción, de nuestras emociones y de la forma en que reaccionamos grupalmente.",
    tabs: [
      {
        nombre: "Naturaleza del conflicto",
        texto: "<p>El conflicto aparece cuando una persona o un grupo percibe que otra persona o grupo afecta o amenaza algo que considera importante. Esta definición destaca que el conflicto es subjetivo: basta con que la amenaza sea interpretada como real por quienes participan para que exista en términos psicológicos.</p><p>El conflicto no debe confundirse automáticamente con agresión, hostilidad o ruptura. Lo decisivo es la forma en que se interpreta y se gestiona.</p>",
        cards: [
          ["Inevitable", "Aparecerán diferencias al compartir decisiones, recursos y responsabilidades.", "chat"],
          ["No siempre negativo", "Revela problemas ocultos y permite escuchar perspectivas minoritarias.", "search"],
          ["No automáticamente productivo", "Para generar aprendizaje exige respeto, apertura y seguridad psicológica.", "sprout"],
          ["Gestión modificadora", "La tensión puede escalar si se personaliza, o educar si se canaliza.", "sliders"]
        ],
        highlight: "El problema no es la existencia del conflicto. El problema comienza cuando dejamos de analizar el asunto y empezamos a defendernos de las personas."
      },
      {
        nombre: "Percepción e interpretación",
        texto: "<p>Las personas no responden a los hechos observables en sí mismos, sino al significado que les atribuyen. Ante la falta de información, la mente formula hipótesis sobre la conducta ajena. El conflicto se intensifica cuando tomamos una interpretación como certeza absoluta y actuamos en consecuencia.</p>",
        acordeon: [
          ["Teoría de la Atribución", "Analiza cómo explicamos las causas de la conducta ajena (ej. 'lo hizo para ignorarme') sin contar con evidencia real."],
          ["Evaluación Cognitiva (Lazarus)", "Explicación del proceso en que valoramos si una situación es una amenaza o un desafío, y si tenemos recursos para afrontarla."],
          ["Modelo ABC (Ellis)", "Distingue entre el Acontecimiento activador (A), las Creencias o interpretaciones (B), y las Consecuencias emocionales y conductuales (C)."]
        ],
        highlight: "Antes de responder, conviene separar tres cosas: qué ocurrió, qué interpreté y qué evidencia tengo para sostener esa interpretación."
      },
      {
        nombre: "Necesidades e identidad",
        texto: "<p>Los conflictos se intensifican cuando las diferencias tocan necesidades profundas y no solo opiniones técnicas. Asimismo, la identidad grupal puede llevarnos a clasificar la realidad entre 'nosotros' y 'ellos', descalificando ideas según el grupo del que provienen.</p>",
        cards: [
          ["Influencia y Estatus", "Se discute quién coordina o representa la organización.", "status"],
          ["Recursos y Seguridad", "Se discute la distribución de presupuestos o prioridades institucionales.", "shield"],
          ["Pertenencia y Estatus", "Se discute quién accede primero a la información o participa de decisiones.", "users"],
          ["Control y Valores", "Se discute cómo interpretar normas o proteger la reputación institucional.", "control"]
        ],
        highlight: "Muchas discusiones técnicas esconden preguntas psicológicas: ¿me escuchan?, ¿cuento?, ¿me respetan?, ¿tengo influencia?, ¿sigo perteneciendo?"
      },
      {
        nombre: "Cuerpo y emociones",
        layout: "timeline-plain",
        image: "/assets/sistema-simpatico-parasimpatico.png",
        imageAlt: "Sistema simpático y parasimpático y su relación con la respuesta ante el conflicto",
        texto: "<p>Las emociones como el miedo, la ira y la frustración orientan nuestra atención y preparan físicamente al organismo. Al percibir una amenaza de carácter social (al estatus o la reputación), el sistema nervioso autónomo reacciona con la misma intensidad que ante un peligro físico.</p>",
        acordeon: [
          ["Sistema Simpático", "Moviliza energía e incrementa el ritmo cardíaco y la tensión muscular para actuar con rapidez."],
          ["Sistema Parasimpático", "Favorece la conservación de energía y promueve el retorno gradual a la calma cuando pasa el peligro."],
          ["Reactividad y Estrés Crónico", "El estrés sostenido afecta la corteza prefrontal y reduce la autorregulación, bajando el umbral de reacción ante provocaciones."]
        ],
        highlight: "Recuperar la calma no es retirarse del problema. Es recuperar las capacidades necesarias para comprenderlo y decidir mejor."
      },
      {
        nombre: "Cómo escala el conflicto",
        layout: "timeline",
        texto: "<p>El conflicto escala gradualmente mediante cambios en la comunicación, la percepción del otro y nuestros objetivos. La intervención más eficiente ocurre en las etapas tempranas, antes de la polarización y la ruptura relacional.</p>",
        acordeon: [
          ["1. Desacuerdo", "Existen posiciones y argumentos diferentes, pero enfocados en la tarea."],
          ["2. Debate endurecido", "El objetivo pasa de comprender a convencer o vencer al otro."],
          ["3. Tensión relacional", "Aumenta la emoción y las intenciones del otro se juzgan negativamente."],
          ["4. Polarización", "Se forman bandos definidos y predomina el rumor o la generalización ('nosotros contra ellos')."],
          ["5. Ruptura", "Se abandona la colaboración y el fin pasa a ser el bloqueo, el retiro o el daño mutuo."]
        ],
        highlight: "La intervención más eficiente ocurre antes de la polarización, cuando todavía se puede discutir el problema sin convertir al otro en el problema."
      },
      {
        nombre: "Tipos de conflicto",
        texto: "<p>La psicología organizacional distingue el contenido del conflicto. Esto permite comprender qué es lo que realmente se está debatiendo y evitar que diferencias intelectuales escalen hacia lo relacional.</p>",
        cards: [
          ["Conflicto de Tarea", "Diferencias sobre la propuesta, la estrategia o la interpretación de datos.", "task"],
          ["Conflicto de Proceso", "Diferencias sobre responsabilidades, métodos, tiempos o la coordinación.", "process"],
          ["Conflicto Relacional", "Hostilidad, incompatibilidad interpersonal, resentimiento o desconfianza mutua.", "relational"],
          ["Conflicto de Estatus", "Disputas por influencia, jerarquía informal o legitimidad para decidir.", "status"]
        ],
        highlight: "Una organización saludable no elimina el desacuerdo: evita que disentir tenga un costo personal."
      },
      {
        nombre: "Estilos de respuesta",
        layout: "matrix",
        texto: "<p>El modelo Thomas-Kilmann organiza las conductas ante el conflicto basándose en dos dimensiones: asertividad (atender lo propio) y cooperatividad (atender al otro). Ningún estilo es mejor; la clave es saber cuándo usar cada uno.</p>",
        acordeon: [
          ["Competir", "Alta asertividad y baja cooperatividad. Útil para decisiones urgentes o límites críticos."],
          ["Colaborar", "Alta asertividad y alta cooperatividad. Útil para integrar necesidades clave de ambas partes."],
          ["Comprometer", "Nivel intermedio. Útil para pactar acuerdos aceptables bajo presión de tiempo."],
          ["Evitar", "Baja asertividad y baja cooperatividad. Útil para enfriar ánimos o posponer temas menores."],
          ["Complacer", "Baja asertividad y alta cooperatividad. Útil si la relación o el tema es vital para el otro."]
        ],
        highlight: "La competencia más importante no es dominar un estilo, sino poder elegir entre varios sin reaccionar únicamente por hábito."

        acordeon: [

        highlight: "Comprender el conflicto no consiste en decidir rápidamente quién tiene la culpa. Consiste en identificar el ciclo que está convirtiendo una diferencia en una amenaza."

      '<div><div class="legal-art">'+a.num+'</div><div class="legal-sub">'+LEY[a.ley].nombre+'</div></div>'+
      '<button class="legal-acc-q">leer artículo <span class=\"chev\">›</span></button></div>'+
      '<div class="legal-body">'+esc(a.texto)+'<div class="legal-src">Texto literal verbatim · '+LEY[a.ley].nombre+'</div></div></div>';
  }).join("");
}
function renderIntro(c){
  return '<div class="intro-box"><div class="intro-q">'+esc(c.preguntaCentral)+'</div>'+
    '<div class="jester"><div class="jester-av"></div>'+
    '<div class="bubble"><div class="jn">Jester piensa…</div><div class="jt">'+esc(c.jester)+'</div></div></div></div>';
}

function getIconSvg(name) {
  const icons = {
    chat: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-dasharray="2 2" /></svg>`,
    search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>`,
    sprout: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12" /><path d="M12 12c-4 0-7-3-7-7 4 0 7 3 7 7Z" /><path d="M12 16c4 0 7-3 7-7-4 0-7 3-7 7Z" /></svg>`,
    sliders: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14" /><line x1="4" y1="10" x2="4" y2="3" /><line x1="12" y1="21" x2="12" y2="12" /><line x1="12" y1="8" x2="12" y2="3" /><line x1="20" y1="21" x2="20" y2="16" /><line x1="20" y1="12" x2="20" y2="3" /><circle cx="4" cy="12" r="2" /><circle cx="12" cy="10" r="2" /><circle cx="20" cy="14" r="2" /></svg>`,
    status: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>`,
    shield: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>`,
    users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>`,
    control: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></svg>`,
    task: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></svg>`,
    process: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>`,
    relational: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>`,
    info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>`
  };
  return icons[name] || icons.info;
}

function renderTab(c,t){
  // 4. Prepared for real images if present in data
  const imgHtml = t.image ? '<div class="tab-image-container"><img src="' + t.image + '" alt="' + (t.imageAlt || '') + '" class="tab-image" /></div>' : '';

  const cards = (t.cards||[]).map(p=> {
    const iconName = p[2] || 'info';
    return '<div class="mini"><div class="mini-icon">' + getIconSvg(iconName) + '</div><div class="t">'+esc(p[0])+'</div><div class="s">'+esc(p[1])+'</div></div>';
  }).join('');

  // 3. Diagram / Timeline custom layouts for specific tabs
  let visualContent = '';
  if ((t.layout === 'timeline' || t.layout === 'timeline-plain') && t.acordeon) {
    // Beautiful interactive timeline instead of accordion
    const steps = t.acordeon.map((p, idx) => {
      let levelClass = 'tl-step-green';
      if (t.layout === 'timeline-plain') {
        if (idx === 0) levelClass = 'tl-step-amber';
        else if (idx === 1) levelClass = 'tl-step-green';
        else if (idx === 2) levelClass = 'tl-step-red';
      } else {
        if (idx >= 2) levelClass = 'tl-step-amber';
        if (idx >= 4) levelClass = 'tl-step-red';
      }

      const badgeHtml = t.layout === 'timeline-plain' 
        ? '<div class="tl-badge plain"></div>' 
        : `<div class="tl-badge">${idx + 1}</div>`;

      return `<div class="tl-item ${levelClass}">
        ${badgeHtml}
        <div class="tl-content">
          <div class="tl-title">${esc(p[0])}</div>
          <div class="tl-desc">${esc(p[1])}</div>
        </div>
      </div>`;
    }).join('');
    visualContent = `<div class="timeline-wrapper">${steps}</div>`;
  } else if (t.layout === 'matrix' && t.acordeon) {
    // Beautiful Thomas-Kilmann 2x2 matrix with 5 styles
    const stylesMap = {};
    t.acordeon.forEach(p => {
      stylesMap[p[0].toLowerCase()] = p[1];
    });
    visualContent = `<div class="matrix-grid">
      <div class="matrix-axis-y">ASERTIVIDAD (Atención a lo propio) &rarr;</div>
      <div class="matrix-container">
        <div class="matrix-header-x">Alto &larr; COOPERATIVIDAD (Atención al otro) &rarr; Bajo</div>
        <div class="matrix-cells">
          <div class="matrix-cell t-colaborar">
            <div class="cell-title">Colaborar</div>
            <div class="cell-desc">${esc(stylesMap['colaborar'] || '')}</div>
          </div>
          <div class="matrix-cell t-competir">
            <div class="cell-title">Competir</div>
            <div class="cell-desc">${esc(stylesMap['competir'] || '')}</div>
          </div>
          <div class="matrix-cell t-comprometer">
            <div class="cell-title">Comprometer</div>
            <div class="cell-desc">${esc(stylesMap['comprometer'] || '')}</div>
          </div>
          <div class="matrix-cell t-complacer">
            <div class="cell-title">Complacer</div>
            <div class="cell-desc">${esc(stylesMap['complacer'] || '')}</div>
          </div>
          <div class="matrix-cell t-evitar">
            <div class="cell-title">Evitar</div>
            <div class="cell-desc">${esc(stylesMap['evitar'] || '')}</div>
          </div>
        </div>
      </div>
    </div>`;
  } else {
    // Default accordion
    const acc=(t.acordeon||[]).map(p=>'<div class="acc-item"><button class="acc-q">'+esc(p[0])+'<span class="chev">></span></button><div class="acc-a">'+esc(p[1])+'</div></div>').join('');
    visualContent = acc ? '<div class="acc">'+acc+'</div>' : '';
  }

  const cuerpo='<div class="cap-body">'+t.texto+'</div>'+
      imgHtml +
      (cards?'<div class="cap-cards">'+cards+'</div>':'')+
      visualContent +
      (t.highlight?'<div class="highlight"><div class="hl-lab">Para recordar</div><div class="ht">'+esc(t.highlight)+'</div></div>':'');
  return '<div class="cap-head"><div><div class="eyebrow">'+esc(c.eyebrow)+'</div><div class="cap-title">'+esc(t.nombre)+'</div></div></div>'+
    cuerpo + renderLegal(t.legalRefs);
}

function buildTree(){
  const nav=$('#nav');
  nav.querySelectorAll('.cap-group').forEach(n=>n.remove());
  CAPS.forEach((c,ci)=>{
    const g=document.createElement('div'); g.className='cap-group';
    const node=document.createElement('button');
    node.className='cap-node'+(ci===cap?' active':'');
    node.innerHTML='<span>'+esc(c.titulo)+'</span>';
    node.addEventListener('click',()=>{cap=ci;tab=-1;render();});
    g.appendChild(node);
    const br=document.createElement('div'); br.className='tab-branch';
    const intro=document.createElement('button');
    intro.className='tab-leaf intro'+(ci===cap&&tab===-1?' on':'');
    intro.innerHTML='Apertura';
    intro.addEventListener('click',()=>{cap=ci;tab=-1;render();});
    br.appendChild(intro);
    c.tabs.forEach((t,ti)=>{
      const lf=document.createElement('button');
      lf.className='tab-leaf'+(ci===cap&&tab===ti?' on':'');
      lf.innerHTML=esc(t.nombre);
      lf.addEventListener('click',()=>{cap=ci;tab=ti;render();});
      br.appendChild(lf);
    });
    g.appendChild(br); nav.appendChild(g);
  });
}
function paintDots(){
  const seq=flat(), d=$('#dots'); d.innerHTML='';
  const here=seq.findIndex(s=>s.ci===cap&&s.ti===tab);
  seq.forEach((_,j)=>{const s=document.createElement('span');s.className='dot'+(j===here?' on':'');d.appendChild(s);});
}
function render(){
  const c=CAPS[cap];
  $('#stage').innerHTML = tab===-1 ? renderIntro(c) : renderTab(c,c.tabs[tab]);
  buildTree();
  if(present) paintDots();
  document.querySelectorAll('.acc-item .acc-q').forEach(q=>q.addEventListener('click',()=>q.parentElement.classList.toggle('open')));
  document.querySelectorAll('.legal-acc-q').forEach(b=>b.addEventListener('click',()=>b.closest('[data-legal]').classList.toggle('open')));
}
function step(d){
  const seq=flat();
  let here=seq.findIndex(s=>s.ci===cap&&s.ti===tab);
  here=(here+d+seq.length)%seq.length;
  cap=seq[here].ci; tab=seq[here].ti; render();
}
function setMode(p){
  present=p;
  document.body.classList.toggle('present',p);
  const t=$('#toggle');
  t.innerHTML=p?'Salir':'Modo presentación';
  if(p && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  if(!p && document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  render();
}
(function(){
  document.querySelectorAll('.parrow').forEach(b=>b.addEventListener('click',()=>step(+b.dataset.d)));
  $('#toggle').addEventListener('click',()=>setMode(!present));
  $('#home').addEventListener('click',()=>window.location.href = '/');
  $('#back').addEventListener('click',()=>window.location.href = '/kb/');
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight') step(1);
    else if(e.key==='ArrowLeft') step(-1);
    else if(e.key==='Escape'&&present) setMode(false);
  });
  render();
})();
</script>
