notes_for_coordinator:
  content_notes: >
    Concepto "dos universos" reutilizado del artefacto avanzado existente
    "Tensiones del mapa de poder cooperativo", simplificado para nivel
    Diplomado Básico: sin tensiones, sin fiscalización a profundidad, sin
    casos de análisis. La sección "Quién preside cada comité" está marcada
    explícitamente como práctica común, no como texto legal literal, porque
    no se encontró artículo RLCH que la respalde de forma directa.
  legal_notes: >
    Todos los artículos citados como texto legal literal fueron verificados
    contra interior_CHC_Ley_Coop.pdf.
  presentation_hints: >
    Conviene un recurso tipo organigrama visual para el tab "Los dos
    universos" y para los puestos de JD/JV, dado que Oliver señaló
    explícitamente que el organigrama "casi nunca sale bien a la primera".
