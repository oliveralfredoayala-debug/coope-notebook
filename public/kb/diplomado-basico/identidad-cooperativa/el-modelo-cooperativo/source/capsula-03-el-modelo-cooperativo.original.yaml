      interpretativa propia, no afirmación textual de North.

notes_for_coordinator:
  content_notes: >
    Tab de excedentes es intencionalmente breve; no duplicar contenido del
    artefacto separado "Explorador de excedentes" (fondos, porcentajes,
    calculadora). Solo idea identitaria del destino del excedente.
  legal_notes: >
    Art. 4 LCH sobre actos cooperativos sin fines de lucro citado en tab 1.
    Sin otros artículos literales extensos en esta cápsula.
  presentation_hints: >
    Tab 1: conviene poder contrastar cooperativa/empresa mercantil lado a
    lado en los mismos criterios (propiedad, control, fin, destino de la
    ganancia). Tab 2: conviene una tabla de dos columnas (instituciones/
    organizaciones) para que el contraste se lea de un vistazo — ya incluida
    como <table> en el HTML. Tab 3: conviene transmitir la idea de equilibrio
    o balanza, no de lista o elección binaria. Tab 4: conviene un enlace o
    referencia visual hacia el artefacto de excedentes.
