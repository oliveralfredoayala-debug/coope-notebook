notes_for_coordinator:
  content_notes: >
    Tab "Por tipo de excedentes" fue descartado por Oliver: no es un eje de
    clasificación real, es consecuencia del tipo de operación (con o sin
    afiliados), ya cubierto en el artefacto separado de excedentes.
  legal_notes: >
    No se encontró artículo específico de LCH/RLCH que regule de forma
    general el tránsito de afiliación cerrada a abierta; el tab se sostiene
    con el caso real de ELGA en vez de una cita legal directa. Marcar para
    verificación futura si aparece fuente.
  presentation_hints: >
    Tab 1 y 2: conviene que las categorías puedan compararse una junto a
    otra. Tab 3: conviene mostrar la transición de ELGA como una secuencia
    temporal (cerrada → semi-abierta → abierta).
