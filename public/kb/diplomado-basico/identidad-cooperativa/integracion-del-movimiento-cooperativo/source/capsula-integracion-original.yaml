notes_for_coordinator:
  content_notes: >
    Esta cápsula comparte base legal (Art. 88 LCH) con la cápsula
    "Clasificación de las cooperativas" (tab "Por grado de integración").
    Esto es intencional: cada cápsula es standalone y no se referencian
    entre sí, así que el traslape es necesario, no un error.
  legal_notes: >
    Todos los artículos citados son literales y fueron verificados contra
    interior_CHC_Ley_Coop.pdf.
  presentation_hints: >
    Conviene distinguir visualmente a la CHC de CONSUCOOP, ya que es un
    punto de confusión frecuente (uno privado/representativo, otro
    estatal/supervisor).
