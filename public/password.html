<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoopeNotebook · Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet">
<style>
:root{
  --fuego:#234a35;
  --fuego-light: #346c4d;
  --oro:#f0a226;
  --oro-glow: rgba(240, 162, 38, 0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  background: linear-gradient(135deg, #0a0f0d 0%, #1a2421 100%);
  color:#ffffff;
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow: hidden;
  position: relative;
}

/* Dynamic background glowing orbs */
body::before, body::after {
  content: '';
  position: absolute;
  width: 50vw;
  height: 50vw;
  border-radius: 50%;
  filter: blur(100px);
  z-index: 0;
  animation: float 10s infinite alternate ease-in-out;
}
body::before {
  background: rgba(35, 74, 53, 0.4);
  top: -10%;
  left: -10%;
}
body::after {
  background: rgba(240, 162, 38, 0.15);
  bottom: -10%;
  right: -10%;
  animation-delay: -5s;
}

@keyframes float {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(5%, 5%) scale(1.1); }
}

.container{
  position: relative;
  z-index: 1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  max-width:1100px;
  width:100%;
  padding:50px;
  align-items:center;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  opacity: 0;
  transform: translateY(30px);
}

@keyframes slideUp {
  to { opacity: 1; transform: translateY(0); }
}

.left{text-align:left}
.left h1{
  font-size:48px;
  font-weight:700;
  font-family:'Space Grotesk', sans-serif;
  background: linear-gradient(to right, #fff, #a3c2b1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom:16px;
  line-height:1.1;
  letter-spacing: -0.02em;
}
.left p{
  font-size:17px;
  color:rgba(255,255,255,0.6);
  margin-bottom:40px;
  max-width:400px;
}

.form-group{margin-bottom:24px; position: relative;}
.form-group label{
  display:block;
  font-size:12px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:rgba(255,255,255,0.5);
  margin-bottom:10px;
  font-family:'Space Grotesk', sans-serif;
}
.form-group input{
  width:100%;
  padding:16px 20px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  font-family:inherit;
  font-size:16px;
  background:rgba(0,0,0,0.2);
  color:#fff;
  transition:all 0.3s ease;
  backdrop-filter: blur(10px);
}
.form-group input::placeholder {
  color: rgba(255,255,255,0.2);
}
.form-group input:focus{
  outline:none;
  border-color:var(--oro);
  background:rgba(0,0,0,0.4);
  box-shadow: 0 0 0 4px var(--oro-glow);
}

.btn{
  width:100%;
  padding:16px;
  background:var(--oro);
  color:#1a2421;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.3s ease;
  font-family:'Space Grotesk', sans-serif;
  margin-top:8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  box-shadow: 0 8px 20px var(--oro-glow);
}
.btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 12px 24px var(--oro-glow);
  background: #f5b44d;
}
.btn:active{
  transform: translateY(1px);
  box-shadow: 0 4px 10px var(--oro-glow);
}

.error{
  font-size:13px;
  color:#ff6b6b;
  margin-top:12px;
  display:none;
  background: rgba(255,107,107,0.1);
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,107,107,0.2);
  animation: shake 0.4s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.right{
  display:flex;
  align-items:center;
  justify-content:center;
  position: relative;
}
.right img{
  max-width:100%;
  height:auto;
  object-fit:contain;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
  animation: floatImg 6s ease-in-out infinite;
}

@keyframes floatImg {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

@media (max-width:1024px){
  body { overflow: auto; padding: 20px; }
  .container{grid-template-columns:1fr;gap:40px; padding: 40px;}
  .right{margin-top:20px; order: -1;}
  .left h1{font-size:36px}
}

@media (max-width:600px){
  .container{padding:30px 20px;}
  .left h1{font-size:28px}
  .left p{font-size:15px; margin-bottom: 30px;}
}
</style>
<link rel="stylesheet" href="/shared/site-chrome.css">
<script src="/shared/site-chrome.js"></script>
</head>
<body>

<div class="container">
  <div class="left">
    <h1>CoopeNotebook</h1>
    <p>Acceso a la plataforma de formación cooperativista.</p>
    
    <form id="passwordForm" style="margin-top:40px">
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresá la contraseña" autofocus="">
      </div>
      <button type="submit" class="btn">Acceder</button>
      <div class="error" id="error">Contraseña incorrecta</div>
    </form>
  </div>

  <div class="right">
    <img src="bg_login.png" alt="Imagen Principal" style="border-radius: 12px;">
  </div>
</div>

<script>
const CORRECT_PASSWORD = 'Art';

document.getElementById('passwordForm').addEventListener('submit', function(e){
  e.preventDefault();
  const input = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  
  if(input === CORRECT_PASSWORD){
    sessionStorage.setItem('kb_auth', 'true');
    window.location.href = '/';
  } else {
    errorEl.style.display = 'block';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
});
</script>


<script>
  if (document.getElementById("last-updated-dyn")) {
    document.getElementById("last-updated-dyn").textContent = new Date(document.lastModified).toLocaleDateString("es-ES", { year: "numeric", month: "long", day: "numeric" });
  }
</script>


</body></html>
