<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="coopenotebook-shell" content="jester-multicase-v1">
<title>Casos de cooperativismo básico · Navegación Jester</title>
<style>
:root{
  --bg:#f3f6f3;--surface:#fff;--surface2:#f9fbf9;--line:#dbe4de;
  --ink:#173428;--muted:#63736b;--green:#2f7d52;--green2:#245f40;
  --greenSoft:#eaf4ee;--amber:#e9a72f;--amberSoft:#fff4dc;
  --purple:#76549b;--purpleSoft:#f4eef9;--blue:#3c7193;--blueSoft:#eaf3f8;
  --red:#b64d4d;--redSoft:#fbecec;--shadow:0 18px 52px rgba(23,52,40,.10);
  --radius:20px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font:16px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,textarea{font:inherit}
button{color:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid rgba(47,125,82,.25);outline-offset:2px}
.app{height:100dvh;display:grid;grid-template-rows:auto minmax(0,1fr) auto}
.topbar{z-index:30;padding:11px 14px 10px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.97);backdrop-filter:blur(12px)}
.toprow{display:flex;align-items:center;gap:10px}
.brand{min-width:0;flex:1}
.brand small{display:block;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
.brand strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}
.iconbtn{min-width:42px;min-height:42px;border:1px solid var(--line);border-radius:13px;background:#fff;font-weight:850;cursor:pointer}
.progressrow{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-top:8px}
.track{height:7px;overflow:hidden;border-radius:999px;background:#e7ece9}
.bar{height:100%;width:10%;border-radius:inherit;background:linear-gradient(90deg,var(--green),#69a97f);transition:width .22s ease}
.progresslabel{color:var(--muted);font-size:11px;font-weight:850}
.shell{min-height:0;display:grid;grid-template-columns:1fr}
.sidebar{display:none}
.main{min-width:0;min-height:0}
.stage{height:100%;overflow:auto;overscroll-behavior:contain;padding:20px 15px 36px;scroll-behavior:smooth}
.slide{max-width:880px;margin:0 auto;animation:enter .2s ease}
@keyframes enter{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.kicker{margin:0 0 7px;color:var(--green);font-size:11px;font-weight:950;letter-spacing:.12em;text-transform:uppercase}
h1{margin:0;font-size:clamp(29px,8vw,48px);line-height:1.04;letter-spacing:-.04em}
.lead{margin:14px 0 0;color:var(--muted);font-size:17px;line-height:1.62}
.card{margin-top:17px;padding:18px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:0 7px 24px rgba(23,52,40,.045)}
.card h2,.card h3{margin:0 0 8px;line-height:1.22}.card p:last-child{margin-bottom:0}
.highlight{border-color:#cadfd2;background:var(--greenSoft)}
.jesterHero{position:relative;overflow:hidden;padding:22px;border:1px solid #efd8a5;border-radius:24px;background:linear-gradient(145deg,#fffaf0,#fff1ce);box-shadow:var(--shadow)}
.jesterHero::after{content:"";position:absolute;right:-55px;top:-65px;width:180px;height:180px;border-radius:50%;background:rgba(233,167,47,.14)}
.jesterFace{position:relative;z-index:1;width:68px;height:68px;display:grid;place-items:center;border-radius:22px;background:#253d31;color:#fff;font-size:34px;transform:rotate(-3deg)}
.jesterHero h2{position:relative;z-index:1;margin:16px 0 6px;font-size:26px;letter-spacing:-.025em}
.jesterHero p{position:relative;z-index:1;margin:0;color:#5e533d}
.rules{display:grid;gap:10px;margin-top:17px}
.rule{display:grid;grid-template-columns:34px 1fr;gap:11px;align-items:start;padding:13px;border:1px solid #eadbb9;border-radius:15px;background:rgba(255,255,255,.72)}
.ruleNum{width:30px;height:30px;display:grid;place-items:center;border-radius:10px;background:var(--amber);color:#493307;font-weight:950}
.rule strong{display:block}.rule span{display:block;margin-top:2px;color:#685f4c;font-size:14px}
.roleGrid{display:grid;gap:9px;margin-top:13px}
.role{padding:13px;border:1px solid var(--line);border-radius:14px;background:#fff}.role strong{display:block}.role span{color:var(--muted);font-size:13px}
textarea{width:100%;padding:13px 14px;border:1px solid #ccd8d0;border-radius:14px;background:#fff;color:var(--ink)}
textarea{min-height:105px;resize:vertical}
.navDemo{margin-top:17px;padding:15px;border:1px solid var(--line);border-radius:18px;background:#fff}
.navDemoTop{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-bottom:11px;border-bottom:1px solid var(--line)}
.navDemoTop strong{font-size:14px}.navDemoTop span{color:var(--muted);font-size:12px;font-weight:850}
.navDemoBar{height:7px;margin-top:9px;overflow:hidden;border-radius:999px;background:#e7ece9}
.navDemoBar i{display:block;width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--green),#69a97f)}
.navDemoBody{padding:15px 0;color:var(--muted);font-size:14px}
.navDemoFoot{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center}
.navDemoFoot b{padding:9px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:13px}
.navDemoFoot b:last-child{border-color:var(--green);background:var(--green);color:#fff}
.navDemoFoot span{text-align:center;color:var(--muted);font-size:11px;font-weight:850}
.caseGrid{display:grid;gap:12px;margin-top:18px}
.caseCard{position:relative;width:100%;padding:17px;border:1px solid var(--line);border-radius:18px;background:#fff;text-align:left;cursor:pointer;transition:.15s ease}
.caseCard:hover{transform:translateY(-1px);border-color:#b9cec0}
.caseCard.selected{border-color:var(--green);background:var(--greenSoft);box-shadow:inset 0 0 0 1px var(--green)}
.caseCard.selected::after{content:"✓";position:absolute;right:15px;top:15px;width:26px;height:26px;display:grid;place-items:center;border-radius:50%;background:var(--green);color:#fff;font-weight:950}
.caseNum{display:inline-flex;padding:4px 8px;border-radius:999px;background:#edf2ef;color:var(--green2);font-size:10px;font-weight:950;letter-spacing:.08em;text-transform:uppercase}
.caseCard h3{margin:10px 35px 5px 0;font-size:19px}.caseCard p{margin:0;color:var(--muted);font-size:14px}
.caseCard .tension{display:block;margin-top:10px;color:#3f5e4d;font-size:12px;font-weight:850}
.actorGrid{display:grid;gap:11px;margin-top:18px}
.actor{position:relative;padding:15px 15px 15px 65px;border:1px solid var(--line);border-radius:17px;background:#fff}
.badge{position:absolute;left:14px;top:14px;width:39px;height:39px;display:grid;place-items:center;border-radius:12px;background:var(--greenSoft);color:var(--green2);font-weight:950}
.actor strong{display:block}.actor span{display:block;margin-top:3px;color:var(--muted);font-size:14px}
.story{margin-top:17px;padding:18px;border:1px solid var(--line);border-radius:20px;background:#fff}
.story p{margin:0 0 13px}.story p:last-child{margin-bottom:0}
.focus{margin-top:15px;padding:16px;border-left:4px solid var(--amber);border-radius:0 16px 16px 0;background:var(--amberSoft);font-weight:750}
.lawStack{display:grid;gap:12px;margin-top:18px}
.law{overflow:hidden;border:1px solid #d9c9e7;border-radius:17px;background:var(--purpleSoft)}
.lawHead{width:100%;display:flex;align-items:center;gap:11px;padding:14px;border:0;background:#eee3f6;text-align:left;cursor:pointer}
.lawSeal{flex:0 0 auto;width:38px;height:38px;display:grid;place-items:center;border-radius:12px;background:var(--purple);color:#fff;font-weight:950}
.lawMeta{min-width:0}.lawMeta strong{display:block}.lawMeta small{display:block;color:#665078}.chev{margin-left:auto;transition:.18s ease}
.law.open .chev{transform:rotate(180deg)}
.lawBody{max-height:0;overflow:hidden;padding:0 16px;color:#403548;transition:max-height .25s ease,padding .25s ease}
.law.open .lawBody{max-height:1200px;padding:16px}
.kind{display:inline-flex;margin-bottom:9px;padding:4px 7px;border:1px solid #d9c9e7;border-radius:999px;color:#65477d;font-size:10px;font-weight:950;letter-spacing:.08em}
.simple{font-weight:750}.verbatim{margin-top:12px;padding-top:12px;border-top:1px solid #dacde3;font-size:14px}
.question{margin-top:19px;padding:17px;border:1px solid var(--line);border-radius:20px;background:#fff}
.question legend,.qtitle{display:block;width:100%;margin:0 0 13px;padding:0;font-size:18px;line-height:1.3;font-weight:900}
.options{display:grid;gap:9px}
.option{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;padding:13px;border:1px solid var(--line);border-radius:15px;background:#fff;cursor:pointer}
.option:has(input:checked){border-color:var(--green);background:var(--greenSoft);box-shadow:inset 0 0 0 1px var(--green)}
.option input{width:19px;height:19px;margin:2px 0 0;accent-color:var(--green)}
.option strong{display:block}.option small{display:block;margin-top:3px;color:var(--muted)}
.actionbtn{margin-top:13px;min-height:43px;border:0;border-radius:13px;padding:10px 14px;background:var(--ink);color:#fff;font-weight:900;cursor:pointer}
.feedback{display:none;margin-top:12px;padding:13px;border-radius:14px;font-weight:750}.feedback.show{display:block}
.feedback.good{border:1px solid #c8dfd0;background:var(--greenSoft);color:#255f3e}.feedback.bad{border:1px solid #ebcccc;background:var(--redSoft);color:#8c3737}
.tensionGrid{display:grid;gap:10px;margin-top:18px}
.tensionCard{position:relative;width:100%;padding:15px 43px 15px 15px;border:1px solid var(--line);border-radius:17px;background:#fff;text-align:left;cursor:pointer}
.tensionCard.selected{border-color:var(--green);background:var(--greenSoft);box-shadow:inset 0 0 0 1px var(--green)}
.tensionCard.selected::after{content:"✓";position:absolute;right:14px;top:14px;width:25px;height:25px;display:grid;place-items:center;border-radius:50%;background:var(--green);color:#fff;font-weight:950}
.anchor{display:block;color:var(--green);font-size:10px;font-weight:950;letter-spacing:.08em}.tensionCard strong{display:block;margin-top:4px;font-size:17px}.tensionCard span:last-child{display:block;margin-top:5px;color:var(--muted);font-size:14px}
.countBox{position:sticky;bottom:0;margin-top:12px;padding:11px 13px;border:1px solid #c9dbd0;border-radius:14px;background:rgba(234,244,238,.96);font-weight:850;backdrop-filter:blur(8px)}
.semaphore{display:grid;gap:9px}.sema{border:1px solid var(--line);border-radius:15px;background:#fff}
.sema label{display:grid;grid-template-columns:auto 1fr;gap:10px;padding:13px;cursor:pointer}.sema:has(input:checked){border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
.sema input{width:19px;height:19px;margin-top:3px;accent-color:var(--green)}
.dot{display:inline-block;width:11px;height:11px;margin-right:7px;border-radius:50%}.dot.green{background:#4e9b6a}.dot.yellow{background:#d5a641}.dot.red{background:#c25b5b}
.textareaWrap{margin-top:14px}.textareaWrap label{display:block;margin-bottom:7px;font-weight:850}.counter{margin-top:5px;color:var(--muted);font-size:12px;text-align:right}
.sentence{margin-top:18px;padding:20px;border:1px solid #ccddd2;border-radius:22px;background:linear-gradient(145deg,#fff,#edf6f0)}
.sentence blockquote{margin:0;font-size:22px;line-height:1.35;font-weight:800;letter-spacing:-.02em}
.decisionGrid{display:grid;gap:13px;margin-top:16px}.shortField{padding:15px;border:1px solid var(--line);border-radius:16px;background:#fff}.shortField label{display:block;margin-bottom:7px;font-weight:850}.shortField textarea{min-height:78px}
.summary{display:grid;gap:12px;margin-top:18px}.summaryBlock{padding:16px;border:1px solid var(--line);border-radius:17px;background:#fff}.summaryBlock h3{margin:0 0 7px}.summaryBlock p{margin:5px 0;color:#4e6057}.empty{color:#89968f;font-style:italic}
.notesDrawer{position:fixed;inset:0;z-index:90;display:none;background:rgba(16,32,25,.50)}.notesDrawer.open{display:block}
.notesPanel{position:absolute;right:0;top:0;width:min(440px,100%);height:100%;display:grid;grid-template-rows:auto 1fr auto;background:#fff;box-shadow:var(--shadow)}
.drawerHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px;border-bottom:1px solid var(--line)}.drawerHead h2{margin:0}
.drawerBody{overflow:auto;padding:16px}.drawerBody textarea{min-height:210px}.drawerBody h3{margin:20px 0 7px}
.drawerFoot{padding:12px 15px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:#fff}
.footer{z-index:30;display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:9px 11px calc(9px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(255,255,255,.98)}
.footer button{min-height:46px;border-radius:14px;padding:10px 14px;font-weight:900;cursor:pointer}.back{border:1px solid var(--line);background:#fff}.next{border:1px solid var(--green);background:var(--green);color:#fff}.next:disabled{border-color:#cfd8d2;background:#dce3df;color:#849188;cursor:not-allowed}.stepName{overflow:hidden;color:var(--muted);font-size:11px;font-weight:850;text-align:center;text-overflow:ellipsis;white-space:nowrap}
.toast{position:fixed;left:50%;bottom:84px;z-index:120;transform:translate(-50%,17px);opacity:0;pointer-events:none;padding:10px 14px;border-radius:12px;background:#1f3d30;color:#fff;font-size:13px;font-weight:850;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(min-width:720px){.stage{padding:30px 28px 50px}.caseGrid,.actorGrid{grid-template-columns:repeat(2,1fr)}.roleGrid{grid-template-columns:repeat(3,1fr)}.tensionGrid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1000px){
  .app{grid-template-rows:auto minmax(0,1fr)}.shell{grid-template-columns:270px minmax(0,1fr)}
  .sidebar{display:block;min-height:0;overflow:auto;padding:22px 15px;border-right:1px solid var(--line);background:#fafbfa}
  .sideTitle{margin:0 9px 13px;color:var(--muted);font-size:10px;font-weight:950;letter-spacing:.1em;text-transform:uppercase}
  .sideNav{display:grid;gap:5px}.sideNav button{width:100%;padding:10px 12px;border:0;border-radius:12px;background:transparent;color:#596861;text-align:left;cursor:pointer}.sideNav button.active{background:#e6eee9;box-shadow:inset 3px 0 var(--amber);color:var(--ink);font-weight:900}.sideNav button.locked{opacity:.48}
  .stage{padding:38px 45px 72px}.footer{position:fixed;right:22px;bottom:18px;width:auto;grid-template-columns:auto auto;padding:8px;border:1px solid var(--line);border-radius:17px;box-shadow:var(--shadow)}.stepName{display:none}.footer button{min-width:112px}
}
@media print{body{overflow:visible;background:#fff}.topbar,.sidebar,.footer,.notesDrawer{display:none!important}.app,.shell,.main,.stage{display:block;height:auto;overflow:visible}.slide{max-width:none}.summaryBlock{break-inside:avoid}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
</style>

<div class="app">
  <header class="topbar">
    <div class="toprow">
      <div class="brand"><small id="eyebrow">Jester · Casos aplicados</small><strong id="headerTitle">Instrucciones generales</strong></div>
      <button class="iconbtn" id="notesBtn" type="button" aria-label="Abrir notas">Notas</button>
      <button class="iconbtn" id="homeBtn" type="button" aria-label="Ir al selector">Casos</button>
    </div>
    <div class="progressrow"><div class="track"><div class="bar" id="bar"></div></div><div class="progresslabel" id="progressLabel">Inicio</div></div>
  </header>

  <div class="shell">
    <aside class="sidebar"><div class="sideTitle">Recorrido</div><nav class="sideNav" id="sideNav"></nav></aside>
    <main class="main"><div class="stage" id="stage" tabindex="-1"></div></main>
  </div>

  <footer class="footer">
    <button class="back" id="backBtn" type="button">Atrás</button>
    <div class="stepName" id="stepName"></div>
    <button class="next" id="nextBtn" type="button">Siguiente</button>
  </footer>
</div>

<div class="notesDrawer" id="notesDrawer">
  <aside class="notesPanel" role="dialog" aria-modal="true" aria-labelledby="notesTitle">
    <div class="drawerHead"><h2 id="notesTitle">Notas y dudas</h2><button class="iconbtn" id="closeNotes" type="button">×</button></div>
    <div class="drawerBody">
      <p class="lead" style="font-size:15px">Estas notas no se califican. Úsenlas para registrar preguntas, desacuerdos o conceptos que quieran consultar después.</p>
      <h3>Notas generales del equipo</h3>
      <textarea id="generalNotes" placeholder="Preguntas o acuerdos que atraviesan todo el ejercicio…"></textarea>
      <h3 id="caseNotesHeading">Notas del caso</h3>
      <textarea id="caseNotes" placeholder="Dudas o ideas específicas del caso seleccionado…"></textarea>
    </div>
    <div class="drawerFoot"><button class="next" id="saveNotes" type="button">Guardar notas</button></div>
  </aside>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>

function toast(msg){const n=document.getElementById("toast");n.textContent=msg;n.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>n.classList.remove("show"),1800)}

const caseSteps=[
  {title:"1 · El caso",render:renderCase},
  {title:"2 · La norma",render:renderLaw},
  {title:"3 · Confirmemos la regla",render:renderQuiz},
  {title:"4 · Puntos de tensión",render:renderTensions},
  {title:"5 · Tomá posición",render:renderPosition},
  {title:"6 · La frase incómoda",render:renderPhrase},
  {title:"7 · Decisión del equipo",render:renderDecision},
  {title:"8 · Resumen",render:renderSummary}
];

function totalPosition(){
  if(state.screen==="intro") return {n:1,total:10,label:"Inicio"};
  if(state.screen==="selector") return {n:2,total:10,label:"Elegir caso"};
  return {n:3+state.caseStep,total:10,label:`${state.caseStep+1} de 8`};
}

function render(){
  const stage=document.getElementById("stage");
  let html="";
  if(state.screen==="intro") html=renderIntro();
  else if(state.screen==="selector") html=renderSelector();
  else html=caseSteps[state.caseStep].render();
  stage.innerHTML=html;
  const p=totalPosition();
  document.getElementById("bar").style.width=`${(p.n/p.total)*100}%`;
  document.getElementById("progressLabel").textContent=p.label;
  document.getElementById("headerTitle").textContent=state.screen==="case"?`${currentCase().group} · ${currentCase().title}`:(state.screen==="selector"?"Seleccioná el caso asignado":"Cómo navegar");
  document.getElementById("eyebrow").textContent=state.screen==="case"?"Jester · Caso aplicado":"Jester · Casos aplicados";
  document.getElementById("stepName").textContent=state.screen==="case"?caseSteps[state.caseStep].title:(state.screen==="selector"?"Selector":"Cómo navegar");
  bindScreen();renderSideNav();updateNav();
}

function renderIntro(){
  return `<section class="slide">
    <p class="kicker">Tab preliminar · Cómo navegar</p>
    <h1>Un enlace, un caso, todas las respuestas</h1>
    <p class="lead">Jester les acompaña durante el recorrido. Este primer tab explica cómo usar la actividad antes de escoger el caso asignado.</p>

    <div class="jesterHero">
      <div class="jesterFace">♜</div>
      <h2>Así funciona la actividad</h2>
      <p>Cada equipo selecciona un solo caso. Después avanza pantalla por pantalla hasta generar un resumen para la plenaria.</p>

      <div class="rules">
        <div class="rule"><span class="ruleNum">1</span><div><strong>Seleccionen únicamente el caso asignado</strong><span>Los cuatro casos están dentro del mismo enlace. El facilitador les indicará cuál corresponde a su equipo.</span></div></div>
        <div class="rule"><span class="ruleNum">2</span><div><strong>Respondan todo para avanzar</strong><span>El botón “Siguiente” se activa únicamente cuando completan todas las preguntas obligatorias de la pantalla.</span></div></div>
        <div class="rule"><span class="ruleNum">3</span><div><strong>Usen Atrás sin perder respuestas</strong><span>Pueden revisar pantallas anteriores. Las selecciones y textos se guardan automáticamente en este dispositivo.</span></div></div>
        <div class="rule"><span class="ruleNum">4</span><div><strong>Abran las tarjetas legales cuando las necesiten</strong><span>La explicación breve aparece primero. Toquen cada acordeón para consultar el texto literal de la norma.</span></div></div>
        <div class="rule"><span class="ruleNum">5</span><div><strong>Las notas son opcionales</strong><span>El botón “Notas” sirve para guardar dudas o comentarios. No sustituye ninguna respuesta obligatoria.</span></div></div>
        <div class="rule"><span class="ruleNum">6</span><div><strong>Terminen en el resumen</strong><span>La última pantalla reúne la posición, la frase y la decisión del equipo para presentarlas en plenaria.</span></div></div>
      </div>
    </div>

    <div class="navDemo" aria-label="Ejemplo de navegación">
      <div class="navDemoTop"><strong>Grupo asignado · Caso aplicado</strong><span>4 de 8</span></div>
      <div class="navDemoBar"><i></i></div>
      <div class="navDemoBody">Cada tab contiene una parte del caso. Si el contenido es largo, deslicen hacia abajo dentro de la pantalla.</div>
      <div class="navDemoFoot"><b>Atrás</b><span>Las respuestas se guardan</span><b>Siguiente</b></div>
    </div>

    <div class="card highlight">
      <strong>Listo.</strong>
      <p>Toquen <b>Escoger caso</b> y abran únicamente el grupo que les asignó el facilitador.</p>
    </div>
  </section>`;
}

function renderSelector(){
  return `<section class="slide">
    <p class="kicker">Selector común</p>
    <h1>Trabajen solo el caso asignado</h1>
    <p class="lead">El facilitador indicará qué grupo corresponde a su equipo. Todos los casos viven en este mismo enlace.</p>
    <div class="caseGrid">
      ${Object.entries(CASES).map(([id,c])=>`<button type="button" class="caseCard ${state.pendingCase===id?"selected":""}" data-case="${id}">
        <span class="caseNum">${c.group}</span><h3>${c.title}</h3><p>${c.short}</p><span class="tension">Duración sugerida: 15–20 minutos</span>
      </button>`).join("")}
    </div>
    <div class="card highlight"><strong>Importante:</strong> abran únicamente el grupo que les asignó el facilitador. Una vez dentro, deberán completar todas las preguntas para llegar al resumen.</div>
  </section>`;
}

function renderCase(){
  const c=currentCase();
  return `<section class="slide">
    <p class="kicker">Paso 1 · El caso</p><h1>${c.caseTitle}</h1><p class="lead">${c.caseLead}</p>
    <div class="actorGrid">${c.actors.map(a=>`<article class="actor"><div class="badge">${a.badge}</div><strong>${a.title}</strong><span>${a.text}</span></article>`).join("")}</div>
    <div class="story">${c.caseBody.map(p=>`<p>${p}</p>`).join("")}</div>
    <div class="focus">${c.focus}</div>
  </section>`;
}

function renderLaw(){
  const c=currentCase();
  return `<section class="slide">
    <p class="kicker">Paso 2 · Lo que establece la norma</p><h1>La ley marca el terreno</h1>
    <p class="lead">Abrí cada tarjeta. Primero lean la explicación sencilla; después consulten el texto literal.</p>
    <div class="lawStack">${c.laws.map((l,i)=>`<article class="law" data-law><button class="lawHead" type="button" aria-expanded="false">
      <span class="lawSeal">§</span><span class="lawMeta"><strong>${l.title}</strong><small>${l.source}</small></span><span class="chev">⌄</span></button>
      <div class="lawBody"><span class="kind">${l.kind}</span><p class="simple">${l.simple}</p><div class="verbatim">${l.verbatim}</div></div></article>`).join("")}</div>
    <div class="focus"><strong>En sencillo:</strong> ${c.plain}</div>
  </section>`;
}

function option(name,id,text,detail=""){
  const s=cs();
  return `<label class="option"><input type="radio" name="${name}" value="${id}" ${s&&s[name]===id?"checked":""}><span><strong>${text}</strong>${detail?`<small>${detail}</small>`:""}</span></label>`;
}

function renderQuiz(){
  const c=currentCase(),s=cs();
  return `<section class="slide">
    <p class="kicker">Paso 3 · Punto de partida común</p><h1>Confirmemos la regla</h1>
    <p class="lead">Esta pregunta no es una opinión. Sirve para asegurar que el equipo comprendió el artículo antes de discutirlo.</p>
    <fieldset class="question"><legend>${c.quiz}</legend><div class="options">${c.quizOptions.map(o=>option("quiz",o.id,o.text)).join("")}</div>
      <button class="actionbtn" id="checkQuiz" type="button">Confirmar respuesta</button>
      ${s.quiz?`<div class="feedback show ${s.quizCorrect?"good":"bad"}">${s.quizCorrect?c.quizGood:c.quizBad}</div>`:""}
    </fieldset>
  </section>`;
}

function renderTensions(){
  const c=currentCase(),s=cs();
  return `<section class="slide">
    <p class="kicker">Paso 4 · Análisis</p><h1>Elijan dos puntos de tensión</h1>
    <p class="lead">Cada punto está amarrado a una norma, principio o valor. No pueden seleccionar más de dos.</p>
    <div class="tensionGrid">${c.tensions.map(t=>`<button type="button" class="tensionCard ${s.tensions.includes(t.id)?"selected":""}" data-tension="${t.id}">
      <span class="anchor">${t.anchor}</span><strong>${t.title}</strong><span>${t.question}</span></button>`).join("")}</div>
    <div class="countBox">Seleccionados: <span id="tensionCount">${s.tensions.length}</span> de 2</div>
  </section>`;
}

function renderPosition(){
  const c=currentCase(),s=cs();
  const names=s.tensions.map(id=>c.tensions.find(t=>t.id===id)?.title).filter(Boolean);
  return `<section class="slide">
    <p class="kicker">Paso 5 · Posición del equipo</p><h1>Lo legal no resuelve toda la pregunta</h1>
    <p class="lead">Su equipo analiza el caso desde <strong>${names.join(" y ")||"los puntos seleccionados"}</strong>.</p>
    <fieldset class="question"><legend>${c.positionPrompt}</legend><div class="semaphore">${c.positionOptions.map(o=>`<div class="sema"><label>
      <input type="radio" name="position" value="${o.id}" ${s.position===o.id?"checked":""}><span><strong><span class="dot ${o.tone}"></span>${o.title}</strong><small>${o.text}</small></span>
    </label></div>`).join("")}</div></fieldset>
    <fieldset class="question"><legend>${c.evidencePrompt}</legend><div class="options">${c.evidenceOptions.map(o=>option("evidence",o.id,o.text)).join("")}</div>
      <div class="textareaWrap"><label for="justification">Expliquen en 1–2 oraciones por qué ese hecho fue decisivo.</label>
      <textarea id="justification" maxlength="300" placeholder="Este hecho importa porque…">${esc(s.justification)}</textarea><div class="counter"><span id="justificationCount">${s.justification.length}</span> / 300</div></div>
    </fieldset>
  </section>`;
}

function renderPhrase(){
  const c=currentCase(),s=cs();
  return `<section class="slide">
    <p class="kicker">Paso 6 · Síntesis</p><h1>La frase incómoda</h1>
    <p class="lead">Escriban lo que normalmente queda escondido detrás del lenguaje institucional.</p>
    <div class="sentence"><blockquote>“${c.phraseStem}”</blockquote>
      <div class="textareaWrap"><label for="phrase">Completen la frase como equipo.</label><textarea id="phrase" maxlength="240" placeholder="Máximo 25 palabras">${esc(s.phrase)}</textarea>
      <div class="counter"><span id="phraseCount">${countWords(s.phrase)}</span> / 25 palabras</div></div>
    </div>
  </section>`;
}

function renderDecision(){
  const c=currentCase(),s=cs();
  return `<section class="slide">
    <p class="kicker">Paso 7 · Cierre</p><h1>La decisión del equipo</h1><p class="lead">${c.decisionPrompt}</p>
    <fieldset class="question"><legend>Elijan una acción</legend><div class="options">${c.decisionOptions.map(o=>option("decision",o.id,o.title,o.detail)).join("")}</div></fieldset>
    <div class="decisionGrid">
      ${shortField("basis",c.basisLabel,s.basis)}
      ${shortField("value",c.valueLabel,s.value)}
      ${shortField("cost",c.costLabel,s.cost)}
    </div>
  </section>`;
}
function shortField(id,label,value){
  return `<div class="shortField"><label for="${id}">${label}</label><textarea id="${id}" maxlength="220">${esc(value)}</textarea><div class="counter"><span id="${id}Count">${value.length}</span> / 220</div></div>`;
}

function selectedText(list,id){return list.find(x=>x.id===id)?.title||list.find(x=>x.id===id)?.text||""}
function renderSummary(){
  const c=currentCase(),s=cs();
  const tensionNames=s.tensions.map(id=>c.tensions.find(t=>t.id===id)?.title).filter(Boolean).join(" · ");
  const position=selectedText(c.positionOptions,s.position);
  const decision=selectedText(c.decisionOptions,s.decision);
  return `<section class="slide">
    <p class="kicker">Paso 8 · Producto del equipo</p><h1>Resumen para la plenaria</h1>
    <p class="lead">Resumen de <strong>${c.group} · ${c.title}</strong>.</p>
    <div class="summary">
      <div class="summaryBlock"><h3>Los dos puntos de tensión</h3><p>${tensionNames||'<span class="empty">Sin respuesta</span>'}</p></div>
      <div class="summaryBlock"><h3>Posición</h3><p><strong>${position||'<span class="empty">Sin respuesta</span>'}</strong></p><p>${esc(s.justification)||'<span class="empty">Sin justificación</span>'}</p></div>
      <div class="summaryBlock"><h3>La frase incómoda</h3><p>“${c.phraseStem} ${esc(s.phrase)||"…"}”</p></div>
      <div class="summaryBlock"><h3>Decisión</h3><p><strong>${decision||'<span class="empty">Sin respuesta</span>'}</strong></p><p><b>Base:</b> ${esc(s.basis)||'<span class="empty">Sin respuesta</span>'}</p><p><b>Protege:</b> ${esc(s.value)||'<span class="empty">Sin respuesta</span>'}</p><p><b>Costo o riesgo:</b> ${esc(s.cost)||'<span class="empty">Sin respuesta</span>'}</p></div>
      ${s.notes?`<div class="summaryBlock"><h3>Notas del caso</h3><p>${esc(s.notes).replaceAll("\n","<br>")}</p></div>`:""}
    </div>
    <div class="card highlight"><strong>Para exponer:</strong> expliquen qué dice la norma, dónde aparece la tensión y qué costo tiene la decisión. No vuelvan a leer todo el caso.</div>
    <button class="actionbtn" id="printBtn" type="button">Imprimir o guardar este resumen</button>
  </section>`;
}

function bindScreen(){
  document.querySelectorAll("[data-law] .lawHead").forEach(b=>b.addEventListener("click",()=>{const law=b.closest(".law");const open=law.classList.toggle("open");b.setAttribute("aria-expanded",String(open))}));
  document.querySelectorAll("[data-case]").forEach(b=>b.addEventListener("click",()=>{state.pendingCase=b.dataset.case;saveState();render()}));
  document.querySelectorAll('input[name="quiz"]').forEach(i=>i.addEventListener("change",()=>{cs().quiz=i.value;cs().quizCorrect=false;saveState();updateNav()}));
  const check=document.getElementById("checkQuiz");if(check)check.addEventListener("click",()=>{if(!cs().quiz){toast("Seleccionen una respuesta.");return}cs().quizCorrect=cs().quiz===currentCase().quizCorrect;saveState();render()});
  document.querySelectorAll("[data-tension]").forEach(b=>b.addEventListener("click",()=>{const id=b.dataset.tension,s=cs();if(s.tensions.includes(id))s.tensions=s.tensions.filter(x=>x!==id);else if(s.tensions.length<2)s.tensions=[...s.tensions,id];else{toast("Solo pueden elegir dos.");return}saveState();render()}));
  ["position","evidence","decision"].forEach(name=>document.querySelectorAll(`input[name="${name}"]`).forEach(i=>i.addEventListener("change",()=>{cs()[name]=i.value;saveState();updateNav()})));
  bindText("justification",300,false);bindText("phrase",25,true);bindText("basis",220,false);bindText("value",220,false);bindText("cost",220,false);
  const print=document.getElementById("printBtn");if(print)print.addEventListener("click",()=>window.print());
}

function bindText(id,max,words){
  const el=document.getElementById(id),counter=document.getElementById(id+"Count");if(!el)return;
  el.addEventListener("input",()=>{let v=el.value;if(words&&countWords(v)>max){v=v.trim().split(/\s+/).slice(0,max).join(" ");el.value=v;toast("Máximo 25 palabras.")}cs()[id]=v;if(counter)counter.textContent=words?countWords(v):v.length;saveState();updateNav()});
}

function validCaseStep(step){
  const s=cs();
  if(!s) return false;
  switch(step){
    case 0:
    case 1:
      return true;
    case 2:
      return s.quizCorrect;
    case 3:
      return s.tensions.length===2;
    case 4:
      return Boolean(s.position && s.evidence && s.justification.trim().length>=25);
    case 5:
      return countWords(s.phrase)>=5 && countWords(s.phrase)<=25;
    case 6:
      return Boolean(
        s.decision &&
        s.basis.trim().length>=12 &&
        s.value.trim().length>=12 &&
        s.cost.trim().length>=12
      );
    case 7:
      return [2,3,4,5,6].every(validCaseStep);
    default:
      return false;
  }
}
function canAccessCaseStep(target){
  if(target<=0) return true;
  for(let step=0;step<target;step++){
    if(!validCaseStep(step)) return false;
  }
  return true;
}
function isValid(){
  if(state.screen==="intro") return true;
  if(state.screen==="selector") return Boolean(state.pendingCase);
  return validCaseStep(state.caseStep);
}

function updateNav(){
  const back=document.getElementById("backBtn"),next=document.getElementById("nextBtn");
  back.disabled=state.screen==="intro";
  next.disabled=!isValid();
  next.textContent=state.screen==="intro"?"Escoger caso":state.screen==="selector"?"Abrir caso":state.caseStep===7?"Volver al selector":"Siguiente";
}

function next(){
  if(!isValid()){toast("Completen lo obligatorio para continuar.");return}
  if(state.screen==="intro"){state.screen="selector"}
  else if(state.screen==="selector"){
    state.caseId=state.pendingCase;state.screen="case";state.caseStep=0;
  }else if(state.caseStep<7)state.caseStep++;
  else{state.screen="selector";state.pendingCase=state.caseId}
  saveState();renderAndTop();
}
function back(){
  if(state.screen==="selector")state.screen="intro";
  else if(state.screen==="case"&&state.caseStep===0){state.screen="selector";state.pendingCase=state.caseId}
  else if(state.screen==="case")state.caseStep--;
  saveState();renderAndTop();
}
function renderAndTop(){render();const st=document.getElementById("stage");st.scrollTop=0;st.focus({preventScroll:true})}

function renderSideNav(){
  const nav=document.getElementById("sideNav");
  let items=[
    {label:"Cómo navegar",screen:"intro"},
    {label:"Seleccionar caso",screen:"selector"}
  ];
  if(state.caseId)items=items.concat(caseSteps.map((x,i)=>({label:x.title,screen:"case",step:i})));
  nav.innerHTML=items.map((it,i)=>{
    const active=it.screen===state.screen&&(it.screen!=="case"||it.step===state.caseStep);
    const locked=it.screen==="case" && !canAccessCaseStep(it.step);
    return `<button type="button" class="${active?"active":""} ${locked?"locked":""}" data-screen="${it.screen}" data-step="${it.step??""}" aria-disabled="${locked}">${locked?"🔒 ":""}${it.label}</button>`;
  }).join("");
  nav.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
    const target=b.dataset.screen;
    if(target==="intro"){state.screen="intro"}
    else if(target==="selector"){state.screen="selector";state.pendingCase=state.caseId||state.pendingCase}
    else{
      const step=Number(b.dataset.step);
      if(!canAccessCaseStep(step)){
        toast("Completen todas las preguntas anteriores para abrir este paso.");
        return;
      }
      state.screen="case";state.caseStep=step;
    }
    saveState();renderAndTop();
  }));
}

function openNotes(){
  document.getElementById("generalNotes").value=state.generalNotes||"";
  document.getElementById("caseNotes").value=state.caseId?cs().notes:"";
  document.getElementById("caseNotes").disabled=!state.caseId;
  document.getElementById("caseNotesHeading").textContent=state.caseId?`Notas · ${currentCase().group}`:"Notas del caso — disponibles después de escoger";
  document.getElementById("notesDrawer").classList.add("open");
}
function closeNotes(){document.getElementById("notesDrawer").classList.remove("open")}
function saveNotes(){
  state.generalNotes=document.getElementById("generalNotes").value;
  if(state.caseId)cs().notes=document.getElementById("caseNotes").value;
  saveState();closeNotes();toast("Notas guardadas.");
}
function goSelector(){
  if(state.screen==="selector")return;
  if(state.screen==="case"&&!confirm("¿Volver al selector? Sus respuestas se conservarán."))return;
  state.screen="selector";state.pendingCase=state.caseId||state.pendingCase;saveState();renderAndTop();
}

document.getElementById("nextBtn").addEventListener("click",next);
document.getElementById("backBtn").addEventListener("click",back);
document.getElementById("notesBtn").addEventListener("click",openNotes);
document.getElementById("closeNotes").addEventListener("click",closeNotes);
document.getElementById("saveNotes").addEventListener("click",saveNotes);
document.getElementById("notesDrawer").addEventListener("click",e=>{if(e.target.id==="notesDrawer")closeNotes()});
document.getElementById("homeBtn").addEventListener("click",goSelector);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeNotes()});
render();
</script>
</body>
</html>
