capsule_id: capsula-02-identidad-cooperativa
note: >
  Banco no student-facing. Fuente para el constructor en vivo. No se entrega
  ni se muestra dentro de los tabs de la cápsula.

questions:

  - id: q-01
    section_id: inner-01-lo-que-somos
    learning_objective: Identificar las cinco piezas de la definición de cooperativa
    difficulty: 1
    question_type: selección múltiple
    prompt: ¿Cuáles de los siguientes son elementos de la definición de cooperativa?
    correct_answer: Asociación autónoma, unión voluntaria, propiedad conjunta, control democrático
    distractors:
      - Búsqueda de lucro máximo
      - Control por parte de un solo dueño
      - Afiliación obligatoria por ley
    explanation: >
      Los cuatro elementos correctos corresponden a la definición legal de
      cooperativa; los distractores son propios de otras formas
      empresariales.
    source_reference: inner-01-lo-que-somos / definicion, piezas
    misconception_addressed: Confundir cooperativa con empresa mercantil de dueño único.
    p2l_uses: [trivia, clasificación]

  - id: q-02
    section_id: inner-01-lo-que-somos
    learning_objective: Aplicar correctamente el concepto de propiedad conjunta
    difficulty: 2
    question_type: opción múltiple
    prompt: Un afiliado quiere vender por su cuenta un bien de la cooperativa. ¿Qué principio de la definición está ignorando?
    correct_answer: Propiedad conjunta.
    distractors:
      - Unión voluntaria.
      - Necesidades y aspiraciones comunes.
      - Control democrático.
    explanation: >
      La propiedad conjunta significa que la membresía ejerce
      colectivamente derechos sobre la empresa, no cada persona
      individualmente.
    source_reference: inner-01-lo-que-somos / piezas (Empresa de propiedad conjunta)
    misconception_addressed: Pensar que un afiliado puede disponer individualmente de bienes cooperativos.
    p2l_uses: [escenario de decisión, duelo]

  - id: q-03
    section_id: inner-02-lo-que-nos-mueve
    learning_objective: Interpretar el significado cooperativo (no religioso) de la invocación
    difficulty: 2
    question_type: opción múltiple
    prompt: >
      ¿Qué significa dentro del contexto cooperativo la frase "exentas de
      egoísmo y espíritu de lucro" de la Invocación?
    correct_answer: Que la acumulación privada no debe convertirse en la finalidad principal de la cooperativa.
    distractors:
      - Que la cooperativa no puede tener excedentes.
      - Que la cooperativa debe operar siempre con pérdidas.
      - Que los afiliados no pueden recibir ningún beneficio económico.
    explanation: >
      La interpretación oficial distingue entre "operar sin pérdidas" (que
      sí es necesario) y "tener el lucro como finalidad" (que no aplica a
      una cooperativa).
    source_reference: inner-02-lo-que-nos-mueve / fragmentos
    misconception_addressed: Confundir "sin espíritu de lucro" con "sin excedentes ni sostenibilidad financiera".
    p2l_uses: [trivia, duelo]

  - id: q-04
    section_id: inner-02-lo-que-nos-mueve
    learning_objective: Recordar el origen y función de la Invocación
    difficulty: 1
    question_type: verdadero o falso
    prompt: La Invocación del Movimiento Cooperativista Hondureño reemplaza a la definición legal de cooperativa.
    correct_answer: Falso
    distractors: []
    explanation: >
      La invocación complementa el propósito humano y ético, pero no
      sustituye la definición legal.
    source_reference: inner-02-lo-que-nos-mueve / introduccion
    misconception_addressed: Pensar que la invocación tiene valor normativo/legal.
    p2l_uses: [trivia, verdadero o falso]

  - id: q-05
    section_id: inner-03-lo-que-nos-representa
    learning_objective: Identificar el significado de cada elemento del símbolo cooperativo
    difficulty: 1
    question_type: relacionar columnas
    prompt: Relaciona cada elemento del símbolo cooperativo con su significado.
    correct_answer: "Pinos ↔ unidad y ayuda mutua | Raíces en círculo ↔ expansión mundial | Verde ↔ naturaleza y vida | Amarillo ↔ el sol"
    distractors:
      - "combinaciones cruzadas incorrectas presentadas como opciones de arrastre en la dinámica"
    explanation: Significados documentados en la sección de simbología del Manual 2020.
    source_reference: inner-03-lo-que-nos-representa / puntos_seleccionables
    misconception_addressed: ninguna, es recuerdo de asociación directa.
    p2l_uses: [memoria, clasificación]

  - id: q-06
    section_id: inner-03-lo-que-nos-representa
    learning_objective: Comprender que el símbolo no garantiza identidad real
    difficulty: 3
    question_type: opción múltiple
    prompt: >
      Una cooperativa usa el símbolo tradicional en todos sus documentos,
      pero no practica control democrático. Según la idea crítica de esta
      cápsula, ¿qué se puede afirmar?
    correct_answer: El símbolo expresa identidad, pero no la garantiza; puede haber identidad decorativa sin práctica real.
    distractors:
      - El uso correcto del símbolo es suficiente para confirmar identidad cooperativa.
      - Esa cooperativa no puede legalmente usar el símbolo.
      - El símbolo obliga automáticamente al control democrático.
    explanation: >
      La idea crítica de la sección advierte explícitamente sobre esta
      brecha entre símbolo y práctica.
    source_reference: inner-03-lo-que-nos-representa / idea_critica
    misconception_addressed: Confundir uso simbólico con cumplimiento real de los principios.
    p2l_uses: [escenario de decisión]

  - id: q-07
    section_id: inner-04-valores-y-principios
    learning_objective: Recordar el número y base legal de valores y principios
    difficulty: 1
    question_type: completar
    prompt: Los valores cooperativos son ____ (cantidad), establecidos en el Art. ____ LCH; los principios son ____ (cantidad), establecidos en el Art. ____ RLCH.
    correct_answer: "10; 4; 7; 8"
    distractors: []
    explanation: Dato de referencia cruzada con las cápsulas de Valores y Principios.
    source_reference: inner-04-valores-y-principios / valores_10, principios_7
    misconception_addressed: ninguna, es recuerdo de dato puntual.
    p2l_uses: [trivia, carrera]

  - id: q-08
    section_id: inner-05-de-la-identidad-a-la-practica
    learning_objective: Distinguir identidad, valores y principios como tres niveles distintos
    difficulty: 2
    question_type: opción múltiple
    prompt: ¿Qué nivel responde a la pregunta "¿cómo organizamos y ponemos en práctica nuestras convicciones?"?
    correct_answer: Principios.
    distractors:
      - Identidad.
      - Valores.
      - Invocación.
    explanation: >
      Identidad responde quiénes somos; Valores responde qué nos debe
      orientar; Principios responde cómo se organiza esa convicción.
    source_reference: inner-05-de-la-identidad-a-la-practica / niveles
    misconception_addressed: Confundir el nivel de "propósito" (valores) con el de "organización" (principios).
    p2l_uses: [trivia, clasificación]

  - id: q-09
    section_id: inner-05-de-la-identidad-a-la-practica
    learning_objective: Aplicar la relación valor-principio-práctica a un caso
    difficulty: 3
    question_type: caso de aplicación
    prompt: >
      Una cooperativa envía a sus afiliados un resumen claro de los temas a
      votar, antes de cada asamblea. ¿Qué valor y qué principio está
      poniendo en práctica?
    correct_answer: Valor de Democracia, Principio de Control democrático de los miembros.
    distractors:
      - Valor de Ayuda mutua, Principio de Autonomía e independencia.
      - Valor de Honestidad, Principio de Educación, formación e información.
      - Valor de Solidaridad, Principio de Cooperación entre cooperativas.
    explanation: >
      Coincide exactamente con la muestra dada en inner_tab_5 (información +
      participación en decisiones = control democrático / democracia).
    source_reference: inner-05-de-la-identidad-a-la-practica / muestra_unica
    misconception_addressed: No reconocer la práctica observable como evidencia concreta de un valor/principio.
    p2l_uses: [escenario de decisión, reto por equipos]
