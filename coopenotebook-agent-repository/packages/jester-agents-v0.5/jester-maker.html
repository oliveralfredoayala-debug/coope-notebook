<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jester Maker</title><style>
:root{--verde:#234a35;--verde2:#2f7d52;--ambar:#f0a226;--fondo:#f5f7f5;--linea:#dfe7e2;--texto:#1a2421;--muted:#5e6a65}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--fondo);color:var(--texto)}
header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:white;border-bottom:1px solid var(--linea);position:sticky;top:0;z-index:5}
header h1{margin:0;font-size:1.15rem}header p{margin:2px 0 0;color:var(--muted);font-size:.82rem}
.wrap{max-width:1250px;margin:0 auto;padding:18px}
.grid{display:grid;grid-template-columns:330px 1fr;gap:16px}
.card{background:white;border:1px solid var(--linea);border-radius:14px;padding:16px}
h2{margin:.1rem 0 .35rem;font-size:1.15rem}p{line-height:1.5}
input,select,textarea,button{font:inherit}
input,select,textarea{width:100%;padding:10px 11px;border:1px solid var(--linea);border-radius:9px;background:white}
textarea{min-height:100px;resize:vertical}
label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:5px}
.field{margin-bottom:12px}
.btn{border:1px solid var(--linea);background:white;border-radius:9px;padding:9px 12px;cursor:pointer;min-height:42px}
.btn.primary{background:var(--verde);color:white;border-color:var(--verde)}
.btn.amber{background:var(--ambar);color:#4a3305;border-color:var(--ambar);font-weight:700}
.btn.danger{color:#9f3434}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.list{display:grid;gap:8px}
.item{border:1px solid var(--linea);border-radius:11px;padding:11px;background:white;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.item h3{margin:0;font-size:.95rem}.item p{margin:4px 0 0;color:var(--muted);font-size:.78rem}
.step{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;border:1px solid var(--linea);border-radius:11px;padding:10px;background:white}
.num{width:36px;height:36px;border-radius:9px;background:var(--ambar);display:grid;place-items:center;font-weight:800;color:#4a3305}
.badge{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 7px;border-radius:99px;background:#fff3db;color:#7a5208;margin-top:5px}
.empty{padding:28px;text-align:center;border:2px dashed var(--linea);border-radius:12px;color:var(--muted)}
.note{padding:10px 12px;border-left:4px solid var(--ambar);background:#fff8e8;border-radius:8px}
.toplink{margin-left:auto}
.status{font-size:.78rem;color:var(--muted)}
@media(max-width:800px){.grid{grid-template-columns:1fr}.step{grid-template-columns:36px 1fr}.step .actions{grid-column:1/-1;justify-content:flex-end}}
</style></head>
<body>
<header>
  <div><h1>Jester Maker</h1><p>Armar talleres y lanzarlos en sala</p></div>
  <a class="btn toplink" href="template-lab.html">Ir a Template Lab</a>
</header>
<div class="wrap">
  <div class="grid">
    <aside class="card">
      <h2>Biblioteca</h2>
      <p class="status">Agrega recursos al taller.</p>
      <div class="field"><label for="search">Buscar</label><input id="search" type="search"></div>
      <div class="list" id="catalog"></div>
    </aside>

    <main class="card">
      <div class="field"><label for="title">Título del taller</label><input id="title" value="Nuevo taller"></div>
      <div class="actions" style="margin-bottom:14px">
        <button class="btn" id="suggestTitle">Pedir título a KB</button>
        <button class="btn amber" id="saveTemplate">Guardar como template</button>
        <button class="btn primary" id="launch">Lanzar sala</button>
      </div>
      <div class="note" id="note">Armá la secuencia y luego guardala o lanzala.</div>
      <div style="height:14px"></div>
      <div class="list" id="sequence"></div>
    </main>
  </div>
</div>

<script>
const CATALOG = [{"id": "theory-1", "type": "theory", "title": "Apertura conceptual", "description": "Introduce el tema central del taller."}, {"id": "theory-2", "type": "theory", "title": "Marco teórico", "description": "Expone conceptos y criterios principales."}, {"id": "team-1", "type": "team", "title": "Trabajo en equipo", "description": "Actividad colaborativa para aplicar lo aprendido."}, {"id": "artifact-1", "type": "artifact", "title": "Artefacto de salida", "description": "Producto o evidencia final del taller."}, {"id": "game-1", "type": "game", "title": "Quiz relámpago", "description": "Juego breve para repasar contenidos."}];
const state={title:"Nuevo taller",sequence:[]};
const $=s=>document.querySelector(s);
function typeName(t){return {theory:"Teoría",team:"Trabajo en equipo",artifact:"Artefacto",game:"Juego"}[t]||t}
function saveDraft(){localStorage.setItem("jester-maker-draft",JSON.stringify(state))}
function loadDraft(){try{const x=JSON.parse(localStorage.getItem("jester-maker-draft"));if(x){state.title=x.title||state.title;state.sequence=Array.isArray(x.sequence)?x.sequence:[]}}catch(e){}}
function renderCatalog(){
 const q=$("#search").value.toLowerCase(); const root=$("#catalog"); root.innerHTML="";
 CATALOG.filter(x=>(x.title+" "+x.description).toLowerCase().includes(q)).forEach(item=>{
  const el=document.createElement("div");el.className="item";
  el.innerHTML=`<div><h3>${item.title}</h3><p>${item.description}</p><span class="badge">${typeName(item.type)}</span></div>`;
  const b=document.createElement("button");b.className="btn";b.textContent="Agregar";b.onclick=()=>{state.sequence.push(item.id);renderSequence();saveDraft()};
  el.appendChild(b);root.appendChild(el);
 });
}
function renderSequence(){
 const root=$("#sequence");root.innerHTML="";
 if(!state.sequence.length){root.innerHTML='<div class="empty">No hay recursos todavía.</div>';return}
 state.sequence.forEach((id,i)=>{
  const item=CATALOG.find(x=>x.id===id); if(!item)return;
  const el=document.createElement("div");el.className="step";
  el.innerHTML=`<div class="num">${i+1}</div><div><strong>${item.title}</strong><div class="status">${typeName(item.type)}</div></div>`;
  const a=document.createElement("div");a.className="actions";
  [["↑",-1],["↓",1],["×",0]].forEach(([txt,delta])=>{const b=document.createElement("button");b.className="btn";b.textContent=txt;b.onclick=()=>{
   if(txt==="×")state.sequence.splice(i,1);else{const j=i+delta;if(j>=0&&j<state.sequence.length)[state.sequence[i],state.sequence[j]]=[state.sequence[j],state.sequence[i]]}
   renderSequence();saveDraft();
  };a.appendChild(b)});
  el.appendChild(a);root.appendChild(el);
 });
}
function templates(){try{return JSON.parse(localStorage.getItem("jester-templates")||"[]")}catch(e){return[]}}
$("#title").oninput=e=>{state.title=e.target.value;saveDraft()};
$("#search").oninput=renderCatalog;
$("#suggestTitle").onclick=()=>{const first=CATALOG.find(x=>x.id===state.sequence[0]);const t=first?first.title+" aplicado":"Taller cooperativo";state.title=t;$("#title").value=t;$("#note").textContent="Título sugerido por KB: "+t;saveDraft()};
$("#saveTemplate").onclick=()=>{if(!state.sequence.length)return alert("Agrega recursos primero");const all=templates();all.push({id:"tpl-"+Date.now(),name:state.title,title:state.title,description:"",sequence:[...state.sequence],updatedAt:new Date().toISOString()});localStorage.setItem("jester-templates",JSON.stringify(all));$("#note").textContent="Template guardado. Ya aparece en Template Lab."};
$("#launch").onclick=()=>{if(!state.sequence.length)return alert("Agrega recursos primero");localStorage.setItem("jester-live-room",JSON.stringify({title:state.title,sequence:state.sequence,startedAt:new Date().toISOString()}));window.open("jester-live-room.html","_blank")};
loadDraft();$("#title").value=state.title;renderCatalog();renderSequence();
</script></body></html>
